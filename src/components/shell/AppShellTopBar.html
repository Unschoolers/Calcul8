<v-app-bar density="compact" flat border>
  <v-app-bar-title>
    <div class="app-bar-title-wrap">
      <span class="app-bar-brand-lockup" aria-hidden="true">
        <span class="app-bar-brand-badge">
          <img src="../../../icons/icon-192.png" alt="" class="app-bar-brand-badge__img" />
        </span>
        <span class="app-bar-brand-copy">
          <span class="app-bar-brand-copy__name">whatfees</span>
          <span class="app-bar-brand-copy__tagline">{{ t('shellTagline') }}</span>
        </span>
      </span>
      <span class="app-bar-scope-chip" :class="scopeChipClass">
        <v-icon size="13" class="mr-1">
          {{ scopeChipIcon }}
        </v-icon>
        {{ scopeChipLabel }}
      </span>
    </div>
  </v-app-bar-title>

  <template v-slot:append>
    <v-menu location="bottom end" offset="10" :transition="false" content-class="account-menu-content">
      <template #activator="{ props: accountMenuProps }">
        <v-btn
          v-bind="accountMenuProps"
          icon
          variant="text"
          size="default"
          class="account-menu-activator"
          :title="googleProfileEmail ? t('accountMenuSignedInAsTitle', { email: googleProfileEmail }) : t('accountMenuSignedInFallback')"
          :aria-label="t('accountMenuLabel')"
        >
          <v-avatar v-if="googleProfilePicture && !googleAvatarLoadFailed" size="28">
            <img
              :src="googleProfilePicture"
              :alt="googleProfileName || 'Google profile picture'"
              class="account-avatar-img"
              referrerpolicy="no-referrer"
              @error="googleAvatarLoadFailed = true"
              @load="googleAvatarLoadFailed = false"
            />
          </v-avatar>
          <v-icon v-else size="26">mdi-account-circle-outline</v-icon>
          <span
            v-if="accountSyncBadgeVisible"
            class="account-menu-sync-badge"
            :class="accountSyncBadgeClass"
            aria-hidden="true"
          >
            <v-icon :size="accountSyncIconSize" :class="accountSyncIconClass">
              {{ accountSyncIcon }}
            </v-icon>
          </span>
          <span v-if="hasProAccess" class="account-menu-pro-badge" aria-hidden="true">
            <v-icon size="10">mdi-crown</v-icon>
          </span>
        </v-btn>
      </template>

      <v-list class="account-menu-list">
        <div class="account-menu-header">
          <v-avatar size="42" class="account-menu-header__avatar">
            <img
              v-if="googleProfilePicture && !googleAvatarLoadFailed"
              :src="googleProfilePicture"
              :alt="googleProfileName || 'Google profile picture'"
              class="account-avatar-img"
              referrerpolicy="no-referrer"
            />
            <span v-else class="account-menu-header__initial">
              {{ (googleProfileName || googleProfileEmail || '?').slice(0, 1).toUpperCase() }}
            </span>
          </v-avatar>
          <div class="account-menu-header__copy">
            <div class="account-menu-header__name">
              {{ googleProfileName || t('accountMenuGoogleAccountFallback') }}
            </div>
            <div class="account-menu-header__email">
              {{ googleProfileEmail || t('accountMenuSignedInFallback') }}
            </div>
            <div class="account-menu-header__meta">
              <div class="account-menu-header__workspace">
                <span class="account-menu-header__workspace-name">{{ currentWorkspaceName }}</span>
              </div>
              <v-chip
                v-if="hasProAccess"
                size="x-small"
                color="warning"
                variant="flat"
                class="account-menu-header__pro-chip"
              >
                <v-icon start size="12">mdi-crown</v-icon>
                Pro
              </v-chip>
            </div>
          </div>
        </div>

        <v-divider class="my-1"></v-divider>

        <v-list-subheader>{{ t('shellWorkspaceSectionLabel') }}</v-list-subheader>
        <v-list-item
          :title="t('personalLabel')"
          prepend-icon="mdi-home-account"
          :active="activeScopeType === 'personal'"
          @click="switchToPersonalWorkspace"
        ></v-list-item>
        <v-list-item
          v-for="workspace in availableWorkspaces"
          :key="workspace.workspaceId"
          :subtitle="workspace.role === 'owner' ? t('shellWorkspaceRoleOwner') : t('shellWorkspaceRoleMember')"
          prepend-icon="mdi-account-multiple-outline"
          :active="activeWorkspaceId === workspace.workspaceId"
          @click="switchToWorkspace(workspace.workspaceId)"
        >
          <template #title>
            <span class="workspace-menu-item-title">
              <span class="workspace-menu-item-title__name">{{ workspace.name }}</span>
              <span
                v-if="activeWorkspaceId === workspace.workspaceId && activeWorkspaceVisibleMembers.length"
                class="workspace-avatar-stack"
                aria-hidden="true"
              >
                <span
                  v-for="member in activeWorkspaceVisibleMembers"
                  :key="`${workspace.workspaceId}:${member.userId}`"
                  class="workspace-avatar-stack__item"
                >
                  <v-avatar size="24" class="workspace-avatar-stack__avatar">
                    <img
                      v-if="member.photoUrl"
                      :src="member.photoUrl"
                      :alt="member.displayName || 'Workspace member avatar'"
                      class="account-avatar-img"
                      referrerpolicy="no-referrer"
                    />
                    <span v-else class="workspace-avatar-stack__initial">
                      {{ (member.displayName || '?').slice(0, 1).toUpperCase() }}
                    </span>
                  </v-avatar>
                  <span
                    class="workspace-avatar-stack__presence"
                    :class="`workspace-avatar-stack__presence--${getWorkspaceMemberPresenceState(member)}`"
                    :title="getWorkspaceMemberPresenceLabel(member)"
                  ></span>
                </span>
                <span v-if="activeWorkspaceOverflowMemberCount > 0" class="workspace-avatar-stack__overflow">
                  +{{ activeWorkspaceOverflowMemberCount }}
                </span>
              </span>
            </span>
          </template>
        </v-list-item>
        <v-list-item
          v-if="activeScopeType === 'personal'"
          :title="t('shellCreateSharedWorkspaceAction')"
          prepend-icon="mdi-plus-circle-outline"
          @click="showCreateWorkspaceModal = true"
        ></v-list-item>
        <v-list-item
          v-if="isWorkspaceScopeActive"
          :title="t('shellWorkspaceActionLabel')"
          prepend-icon="mdi-account-cog-outline"
          @click="openWorkspaceMembersModal"
        ></v-list-item>

        <v-divider class="my-1"></v-divider>

        <v-list-subheader>{{ t('shellAppSectionLabel') }}</v-list-subheader>
        <v-list-item
          v-if="showInstallPrompt"
          :title="t('shellInstallAppAction')"
          prepend-icon="mdi-download"
          @click="promptInstall"
        ></v-list-item>
        <v-list-item
          :title="t('configSystemConfigurationAction')"
          :subtitle="t('shellSystemConfigurationSubtitle')"
          prepend-icon="mdi-tune-variant"
          @click="showSystemConfigurationDialog = true"
        ></v-list-item>
        <v-list-item
          :title="t('shellImportWhatnotCsvAction')"
          :subtitle="t('shellImportWhatnotCsvSubtitle')"
          prepend-icon="mdi-file-delimited-outline"
          @click="openWhatnotCsvImportDialog"
        ></v-list-item>
        <v-list-item
          v-if="(whatnotConnectionSummary?.pendingReviewCount ?? 0) > 0 || whatnotReviewBatchId"
          :title="whatnotConnectionSummary?.pendingReviewCount
            ? `${t('shellReviewWhatnotImportsAction')} (${whatnotConnectionSummary.pendingReviewCount})`
            : t('shellReviewWhatnotImportsAction')"
          :subtitle="t('shellReviewWhatnotImportsSubtitle')"
          prepend-icon="mdi-table-eye"
          @click="openWhatnotReviewDialog"
        ></v-list-item>
        <v-list-item
          v-if="isWorkspaceScopeActive"
          :title="workspaceRealtimeTitle"
          :subtitle="workspaceRealtimeSubtitle"
          :prepend-icon="workspaceRealtimeIcon"
        >
          <template #append>
            <v-btn
              v-if="workspaceRealtimeManualRefreshVisible"
              size="small"
              variant="tonal"
              color="primary"
              class="account-menu-realtime-refresh"
              @click.stop="recoverWorkspaceRealtimeNow"
            >
              {{ workspaceRealtimeManualRefreshLabel }}
            </v-btn>
          </template>
        </v-list-item>
        <v-list-item
          :title="syncStatusTitle"
          :subtitle="syncStatusSubtitle"
          :prepend-icon="syncStatusIcon"
          @click="debugLogEntitlement(true)"
        ></v-list-item>
        <v-list-item
          :title="isDark ? t('shellSwitchToLightModeAction') : t('shellSwitchToDarkModeAction')"
          :prepend-icon="isDark ? 'mdi-weather-sunny' : 'mdi-weather-night'"
          @click="toggleTheme"
        ></v-list-item>

        <v-divider class="my-1"></v-divider>

        <v-list-subheader>{{ t('shellLanguageSectionLabel') }}</v-list-subheader>
        <v-list-item :title="t('shellLanguageLabel')" class="account-menu-list__language-item">
          <template #append>
            <v-btn-toggle
              :model-value="preferredLanguage || 'en'"
              mandatory
              density="compact"
              variant="tonal"
              @update:model-value="setPreferredLanguage($event)"
            >
              <v-btn value="en">{{ t('commonEnglishShort') }}</v-btn>
              <v-btn value="fr-CA">{{ t('commonFrenchCanadaShort') }}</v-btn>
            </v-btn-toggle>
          </template>
        </v-list-item>

        <template v-if="whatnotConnectionStatus !== 'unconfigured'">
          <v-divider class="my-1"></v-divider>

          <v-list-subheader>{{ t('shellIntegrationsSectionLabel') }}</v-list-subheader>
          <v-list-item
            :title="whatnotConnectionTitle"
            :subtitle="whatnotConnectionSubtitle"
            :prepend-icon="whatnotConnectionIcon"
          ></v-list-item>
          <v-list-item
            v-if="(activeScopeType === 'personal' || isCurrentWorkspaceOwner) && !whatnotConnectionSummary?.connected"
            :title="whatnotConnectActionTitle"
            prepend-icon="mdi-connection"
            :disabled="whatnotConnectionStatus === 'connecting'"
            @click="connectWhatnot"
          ></v-list-item>
          <v-list-item
            v-if="whatnotConnectionSummary?.connected"
            :title="whatnotConnectionSummary.pendingReviewCount > 0
              ? `${t('shellReviewWhatnotImportsAction')} (${whatnotConnectionSummary.pendingReviewCount})`
              : t('shellReviewWhatnotImportsAction')"
            prepend-icon="mdi-table-eye"
            @click="openWhatnotReviewDialog"
          ></v-list-item>
          <v-list-item
            v-if="whatnotConnectionSummary?.connected && (activeScopeType === 'personal' || isCurrentWorkspaceOwner)"
            :title="whatnotSyncActionTitle"
            prepend-icon="mdi-refresh"
            :disabled="whatnotSyncStatus === 'syncing'"
            @click="syncWhatnotSales"
          ></v-list-item>
          <v-list-item
            v-if="whatnotConnectionSummary?.connected && (activeScopeType === 'personal' || isCurrentWorkspaceOwner)"
            :title="t('shellDisconnectWhatnotAction')"
            prepend-icon="mdi-link-off"
            @click="disconnectWhatnot"
          ></v-list-item>

          <v-divider class="my-1"></v-divider>
        </template>

        <v-list-subheader>{{ t('shellAccountSectionLabel') }}</v-list-subheader>
        <v-list-item
          :title="t('shellClearDataAction')"
          :subtitle="t('shellClearDataSubtitle')"
          prepend-icon="mdi-delete-alert-outline"
          @click="askConfirmation(
            {
              title: t('shellClearDataConfirmTitle'),
              text: t('shellClearDataConfirmBody'),
              color: 'error'
            },
            () => clearPersonalAccountData()
          )"
        ></v-list-item>
        <v-list-item
          :title="t('shellSignOutAction')"
          prepend-icon="mdi-logout"
          @click="logoutCurrentSession"
        ></v-list-item>
      </v-list>
    </v-menu>
  </template>
</v-app-bar>
