<v-main id="app-main" tabindex="-1">
  <v-container fluid class="auth-gate-shell">
    <v-card class="auth-gate-card" elevation="8" max-width="430">
      <v-card-text class="pa-6 pa-sm-8 text-center">
        <img src="../../../icons/icon-192.png" alt="WhatFees" class="auth-gate-logo" />
        <p class="text-overline auth-gate-overline mb-2">WhatFees</p>
        <h1 class="text-h5 font-weight-bold mb-2 auth-gate-title">
          {{ authGateTitle }}
        </h1>
        <p class="text-body-2 text-medium-emphasis mb-6">
          {{ authGateSubtitle }}
        </p>

        <v-btn
          v-if="showNativeGoogleSignInAction"
          block
          size="large"
          variant="outlined"
          color="secondary"
          class="auth-gate-btn"
          @click="promptGoogleSignIn"
        >
          <span class="auth-gate-btn__content">
            <v-icon size="22" class="auth-gate-btn__icon">mdi-google</v-icon>
            <span class="auth-gate-btn__label">{{ t('authContinueWithGoogleAction') }}</span>
            <span class="auth-gate-btn__spacer" aria-hidden="true"></span>
          </span>
        </v-btn>

        <div
          v-else
          id="google-signin-button"
          class="auth-gate-google-button"
          aria-label="Sign in with Google"
        ></div>

        <p v-if="showGoogleSignInFallback" class="auth-gate-fallback-copy">
          {{ t('authGoogleFallbackHint') }}
        </p>

        <v-btn
          v-if="showGoogleSignInFallback"
          block
          size="large"
          variant="outlined"
          color="secondary"
          class="auth-gate-btn auth-gate-btn--fallback"
          @click="promptGoogleSignIn"
        >
          <span class="auth-gate-btn__content">
            <v-icon size="22" class="auth-gate-btn__icon">mdi-google</v-icon>
            <span class="auth-gate-btn__label">{{ t('authGoogleFallbackAction') }}</span>
            <span class="auth-gate-btn__spacer" aria-hidden="true"></span>
          </span>
        </v-btn>
      </v-card-text>
    </v-card>
  </v-container>
</v-main>
