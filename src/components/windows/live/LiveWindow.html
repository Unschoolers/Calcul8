<v-container fluid class="pa-2 live-window-shell">

  <div v-if="currentLotType === 'singles'" class="live-singles-shell">
    <live-singles-panel ref="liveSinglesPanel"></live-singles-panel>
  </div>
  <v-row v-else density="comfortable" class="live-pricing-grid">
    <v-col cols="12" md="6" lg="4" class="live-pricing-grid__col">
      <live-price-card
        :ctx="ctx"
        v-model="livePackPrice"
        :label="t('livePriceCardItemLabel', 'Item')"
        icon="mdi-tag-outline"
        avatar-color="primary"
        :units="totalPacks"
        :remaining-units="getRemainingUnitsForMode('item')"
        :calculate-profit="profitForLive"
        :estimate-profit-at-price="(price) => liveScenarioProfitAtPrice('item', price)"
        :estimate-percent-at-price="(price) => liveScenarioPercentAtPrice('item', price)"
        :safe-fixed="safeFixedForLive"
        :avg-price-needed="requiredPackPriceFromNow"
        :forecast-profit="liveScenarioProfit('item')"
        :forecast-percent="liveScenarioPercent('item')"
        :needed-profit="liveScenarioProfitAtNeeded('item')"
        :needed-percent="liveScenarioPercentAtNeeded('item')"
        :profit-basis="totalCaseCost"
      ></live-price-card>
    </v-col>

    <v-col cols="12" md="6" lg="4" class="live-pricing-grid__col">
      <live-price-card
        :ctx="ctx"
        v-model="liveBoxPriceSell"
        :label="t('livePriceCardBoxLabel', 'Box')"
        icon="mdi-cube-outline"
        avatar-color="secondary"
        :units="boxesPurchased"
        :remaining-units="getRemainingUnitsForMode('box')"
        :calculate-profit="profitForLive"
        :estimate-profit-at-price="(price) => liveScenarioProfitAtPrice('box', price)"
        :estimate-percent-at-price="(price) => liveScenarioPercentAtPrice('box', price)"
        :safe-fixed="safeFixedForLive"
        :avg-price-needed="requiredBoxPriceFromNow"
        :forecast-profit="liveScenarioProfit('box')"
        :forecast-percent="liveScenarioPercent('box')"
        :needed-profit="liveScenarioProfitAtNeeded('box')"
        :needed-percent="liveScenarioPercentAtNeeded('box')"
        :profit-basis="totalCaseCost"
      ></live-price-card>
    </v-col>

    <v-col cols="12" md="6" lg="4" class="live-pricing-grid__col">
      <live-price-card
        :ctx="ctx"
        v-model="liveSpotPrice"
        :label="t('livePriceCardRandomHitLabel', 'Random hit')"
        icon="mdi-cards-playing-outline"
        avatar-color="success"
        :units="totalSpots"
        :remaining-units="getRemainingUnitsForMode('rtyh')"
        :calculate-profit="profitForLive"
        :estimate-profit-at-price="(price) => liveScenarioProfitAtPrice('rtyh', price)"
        :estimate-percent-at-price="(price) => liveScenarioPercentAtPrice('rtyh', price)"
        :safe-fixed="safeFixedForLive"
        :avg-price-needed="requiredSpotPriceFromNow"
        :forecast-profit="liveScenarioProfit('rtyh')"
        :forecast-percent="liveScenarioPercent('rtyh')"
        :needed-profit="liveScenarioProfitAtNeeded('rtyh')"
        :needed-percent="liveScenarioPercentAtNeeded('rtyh')"
        :profit-basis="totalCaseCost"
      ></live-price-card>
    </v-col>
  </v-row>
</v-container>
