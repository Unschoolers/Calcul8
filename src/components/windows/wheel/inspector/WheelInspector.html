<v-card
  class="wheel-inspector-panel"
  :class="{ 'wheel-inspector-panel--mobile-open': wheelMobileInspectorOpen }"
  variant="outlined"
>
  <v-card-title class="wheel-panel-title">
    <div class="wheel-inspector-mobile-handle" aria-hidden="true"></div>
    <div class="wheel-panel-title__row">
      <div class="wheel-panel-title__copy">
        <div class="wheel-panel-heading">
          <v-icon start size="small">{{ wheelInspectorPanelMeta.icon }}</v-icon>
          {{ wheelInspectorPanelMeta.title }}
        </div>
        <div class="wheel-panel-subtitle">
          {{ wheelInspectorPanelMeta.subtitle }}
        </div>
      </div>
      <v-btn
        icon="mdi-close"
        size="small"
        variant="text"
        class="wheel-inspector-mobile-close"
        @click="closeWheelInspector"
      ></v-btn>
    </div>
  </v-card-title>
  <v-card-text class="wheel-inspector-panel__body">
    <v-btn-toggle
      v-if="!wheelIsCompactLayout"
      :model-value="wheelInspectorTab"
      mandatory
      divided
      density="comfortable"
      variant="outlined"
      class="wheel-inspector-toggle"
      @update:model-value="wheelInspectorTab = $event"
    >
      <v-btn v-for="tab in wheelInspectorTabItems" :key="tab.id" :value="tab.id" size="small">
        <v-icon start size="small">{{ tab.icon }}</v-icon>
        {{ tab.label }}
      </v-btn>
    </v-btn-toggle>

    <section v-show="wheelInspectorTab === 'config'" class="wheel-panel-section">

      <template v-if="editingWheelConfig">
        <div class="wheel-compact-settings">
          <div class="wheel-compact-setting">
            <div class="wheel-compact-setting__label">{{ t('wheelInspectorSpinPriceLabel') }}</div>
            <v-text-field v-model.number="editingWheelConfig.spinPrice" type="number"
              :aria-label="t('wheelInspectorSpinPriceLabel')"
              min="0.5" step="0.5" variant="outlined" density="compact"
              hide-details="auto"></v-text-field>
          </div>
          <div class="wheel-compact-setting">
            <div class="wheel-compact-setting__label">{{ t('wheelInspectorTargetMarginLabel') }}</div>
            <v-text-field v-model.number="editingWheelConfig.targetMargin"
              :aria-label="t('wheelInspectorTargetMarginLabel')"
              type="number" min="0" max="100" step="5" variant="outlined" density="compact"
              hide-details="auto"></v-text-field>
          </div>
          <div class="wheel-compact-setting">
            <div class="wheel-compact-setting__label">{{ t('wheelInspectorOutcomeCountLabel') }}</div>
            <v-text-field v-model.number="editingWheelConfig.outcomeCount"
              :aria-label="t('wheelInspectorOutcomeCountLabel')"
              type="number" min="4" max="200" step="1" variant="outlined" density="compact"
              hide-details="auto"></v-text-field>
          </div>
        </div>

        <v-divider class="my-2"></v-divider>
        <div class="wheel-section-heading">
          <div>
            <div class="wheel-section-title">{{ t('wheelInspectorWheelTiersTitle') }}</div>
            <div class="wheel-section-subtitle">{{ t('wheelOddsSubtitle') }}</div>
          </div>
          <span
            class="wheel-odds-total-badge"
            :class="{ 'wheel-odds-total-badge--valid': wheelOddsTotalValid }"
          >
            {{ wheelOddsTotalDisplay }}
          </span>
        </div>

        <div v-if="wheelBuilderTierGroups.length" class="wheel-builder-groups">
          <div
            v-for="group in wheelBuilderTierGroups"
            :key="group.key"
            class="wheel-builder-group"
          >
            <div class="wheel-builder-group__header">
              <div class="wheel-builder-group__copy">
                <div class="wheel-builder-group__title-row">
                  <v-icon size="16" class="wheel-builder-group__icon">
                    {{ group.key === 'unassigned' ? 'mdi-alert-circle-outline' : 'mdi-database-outline' }}
                  </v-icon>
                  <div class="wheel-builder-group__title">{{ group.title }}</div>
                  <span class="wheel-builder-group__count">{{ group.countLabel }}</span>
                </div>
                <div class="wheel-builder-group__detail">{{ group.detail }}</div>
              </div>
            </div>

            <div class="wheel-builder-group__tiers">
              <wheel-tier-card
                v-for="entry in group.tiers"
                :key="entry.tier.id"
                :ctx="getWindowComponentContext()"
                :tier="entry.tier"
                :tier-index="entry.index"
              ></wheel-tier-card>
            </div>
          </div>
        </div>

        <v-btn size="small" variant="text" color="primary" prepend-icon="mdi-plus" class="mt-1"
          @click="addTier">
          {{ t('wheelInspectorAddTierAction') }}
        </v-btn>
      </template>

      <v-alert v-else type="info" variant="tonal" density="compact" class="mt-2">
        {{ t('wheelInspectorEmptyState') }}
      </v-alert>
    </section>

    <wheel-session-panel
      v-show="wheelInspectorTab === 'session'"
      :ctx="getWindowComponentContext()"
    ></wheel-session-panel>

    <section v-show="wheelInspectorTab === 'history'" class="wheel-panel-section">
      <wheel-history-panel :ctx="getWindowComponentContext()"></wheel-history-panel>
    </section>
  </v-card-text>
</v-card>
