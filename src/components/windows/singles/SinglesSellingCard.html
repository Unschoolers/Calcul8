<v-col cols="12">
  <v-card elevation="4" class="singles-selling-card">
    <v-card-title class="text-subtitle-1 singles-section-title-bar">
      <div class="singles-section-title-group">
        <v-icon size="16">mdi-cash-multiple</v-icon>
        <span>Selling</span>
      </div>
    </v-card-title>
    <v-divider></v-divider>
    <v-card-text>
      <div class="d-flex align-center justify-space-between flex-wrap ga-2 mb-3">
        <div class="text-caption text-medium-emphasis">Selling currency</div>
        <v-btn-toggle
          v-model="sellingCurrency"
          mandatory
          density="compact"
          variant="tonal"
          class="pill-toggle"
          @update:model-value="onPurchaseConfigChange"
        >
          <v-btn value="CAD" title="CAD">🇨🇦</v-btn>
          <v-btn value="USD" title="USD">🇺🇸</v-btn>
        </v-btn-toggle>
      </div>
      <v-row dense class="align-center mb-2">
        <v-col cols="9">
          <v-text-field
            :model-value="!hasProAccess
              ? 'Upgrade to set target profit'
              : (targetProfitPercent ? targetProfitPercent + '%' : 'Not set')"
            label="Target Profit %"
            variant="outlined"
            density="compact"
            hide-details
            readonly
            class="mb-0"
            prepend-inner-icon="mdi-calculator"
          ></v-text-field>
        </v-col>
        <v-col cols="3" class="d-flex justify-end">
          <v-btn
            icon="mdi-calculator"
            size="small"
            color="secondary"
            variant="tonal"
            class="selling-auto-btn"
            :title="hasProAccess ? 'Open price calculator' : 'Upgrade to unlock price calculator'"
            :aria-label="hasProAccess ? 'Open price calculator' : 'Upgrade to unlock price calculator'"
            :disabled="!hasLotSelected"
            @click="accessProFeature('autoCalculate')"
          ></v-btn>
        </v-col>
      </v-row>

      <v-text-field
        v-model.number="sellingTaxPercent"
        label="Selling Taxes %"
        type="number"
        variant="outlined"
        density="compact"
        step="0.01"
        :min="0"
        class="mb-2"
        hide-details
        @input="onPurchaseConfigChange"
      ></v-text-field>

      <v-text-field
        v-model.number="sellingShippingPerOrder"
        :label="`Average Buyer Shipping (${sellingCurrency})`"
        type="number"
        variant="outlined"
        density="compact"
        prefix="$"
        step="0.01"
        :min="0"
        class="mb-2"
        hide-details
        @input="onPurchaseConfigChange"
      ></v-text-field>
    </v-card-text>
  </v-card>
</v-col>
