<div class="wheel-mobile-action-rail">
    <v-btn
        variant="tonal"
        class="wheel-mobile-action-rail__secondary"
        @click="$emit('open-inspector', mode === 'live' ? 'session' : 'config')"
    >
        <v-icon start size="small">{{ mode === 'live' ? 'mdi-chart-box-outline' : 'mdi-tune' }}</v-icon>
        {{ mode === 'live' ? 'Session' : 'Builder' }}
    </v-btn>
    <v-btn
        color="primary"
        variant="elevated"
        class="wheel-mobile-action-rail__primary"
        :disabled="primaryDisabled"
        @click="$emit('primary-spin')"
    >
        <v-icon start>{{ primaryIcon }}</v-icon>
        {{ primaryLabel }}
    </v-btn>
    <v-btn
        v-if="mode === 'live'"
        color="warning"
        variant="tonal"
        class="wheel-mobile-action-rail__secondary"
        :disabled="endingSession"
        @click="$emit('end-wheel')"
    >
        <v-icon start size="small">mdi-flag-checkered</v-icon>
        End
    </v-btn>
    <v-btn
        v-else
        variant="tonal"
        class="wheel-mobile-action-rail__secondary"
        @click="$emit('open-inspector', 'session')"
    >
        <v-icon start size="small">mdi-chart-box-outline</v-icon>
        Session
    </v-btn>
</div>
