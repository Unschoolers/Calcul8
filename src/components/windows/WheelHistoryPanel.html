<template v-if="latestOnly">
  <v-card
    v-if="wheelHistoryPanelLatestEntry"
    variant="outlined"
    class="wheel-fairness-history"
    :class="{ 'wheel-fairness-history--presentation': presentation }"
  >
    <div class="wheel-fairness-history__toggle wheel-fairness-history__toggle--static">
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" :color="wheelHistoryPanelLatestEntry.seed ? 'success' : 'warning'">
          {{ wheelHistoryPanelLatestEntry.seed ? 'mdi-shield-check' : 'mdi-lock' }}
        </v-icon>
        <div>
          <div class="wheel-fairness-history__title">
            {{
              !wheelHistoryPanelLatestEntry.seed
                ? t('wheelFairnessResultLockedTitle')
                : wheelHistoryPanelLatestEntry.verificationUrl
                  ? t('wheelFairnessServerVerifiedTitle')
                  : t('wheelFairnessLocalVerifiedTitle')
            }}
          </div>
          <div class="wheel-fairness-history__summary">
            {{
              !wheelHistoryPanelLatestEntry.seed
                ? t('wheelFairnessCommittedSummary')
                : wheelHistoryPanelLatestEntry.verificationUrl
                  ? t('wheelFairnessServerVerificationSummary')
                  : t('wheelFairnessLocalVerificationSummary')
            }}
          </div>
        </div>
      </div>
    </div>
    <div class="wheel-fairness-history__list">
      <div class="wheel-fairness-history__item">
        <div class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">
            {{ t('wheelFairnessSpinNumberLabel', { count: wheelHistoryPanelLatestEntry.spinNumber }) }}
          </div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: wheelHistoryPanelLatestEntry.color }"></span>
            {{ wheelHistoryPanelLatestEntry.label }}
          </div>
        </div>
        <div
          v-if="wheelHistoryPanelLatestEntry.seed"
          class="wheel-fairness-history__mode"
        >
          {{
            wheelHistoryPanelLatestEntry.verificationUrl
              ? t('wheelFairnessServerModeLabel')
              : t('wheelFairnessLocalModeLabel')
          }}
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelLatestEntry.hash }}</code>
          </div>
          <div v-if="wheelHistoryPanelLatestEntry.clientSeed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessClientSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelLatestEntry.clientSeed }}</code>
          </div>
          <div v-if="wheelHistoryPanelLatestEntry.seed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelLatestEntry.seed }}</code>
          </div>
        </div>
        <div v-if="wheelHistoryPanelLatestEntry.verificationUrl" class="wheel-fairness-history__actions">
          <a
            :href="wheelHistoryPanelLatestEntry.verificationUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="wheel-fairness-history__verify-link"
          >
            {{ t('wheelFairnessVerifyAction') }}
          </a>
        </div>
        <div v-if="wheelHistoryPanelLatestEntry.seed" class="wheel-fairness-history__note">
          {{ t('wheelFairnessSeedVerifiedNote') }}
        </div>
      </div>
    </div>
  </v-card>
</template>

<template v-else-if="wheelHistoryPanelSpinHash || wheelHistoryPanelEntries.length">
  <v-card variant="outlined" class="wheel-fairness-history wheel-fairness-history--current">
    <div class="wheel-fairness-history__toggle wheel-fairness-history__toggle--static">
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" :color="wheelHistoryPanelFairnessIconColor">{{ wheelHistoryPanelFairnessIcon }}</v-icon>
        <div>
          <div class="wheel-fairness-history__title">{{ wheelHistoryPanelTitle }}</div>
          <div class="wheel-fairness-history__summary">
            {{ wheelHistoryPanelSummaryText }}
          </div>
        </div>
      </div>
    </div>
    <div v-if="wheelHistoryPanelSpinHash" class="wheel-fairness-history__list">
      <div class="wheel-fairness-history__item">
        <div v-if="wheelHistoryPanelLastResult" class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">{{ t('wheelFairnessLatestSpinLabel') }}</div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: wheelHistoryPanelLastResultColor }"></span>
            {{ wheelHistoryPanelLastResultClean }}
          </div>
        </div>
        <div
          v-if="wheelHistoryPanelSpinSeed && !wheelHistoryPanelSpinning"
          class="wheel-fairness-history__mode"
        >
          {{
            wheelHistoryPanelSpinVerificationUrl
              ? t('wheelFairnessServerModeLabel')
              : t('wheelFairnessLocalModeLabel')
          }}
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelSpinHash }}</code>
          </div>
          <div v-if="wheelHistoryPanelSpinClientSeed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessClientSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelSpinClientSeed }}</code>
          </div>
          <div v-if="wheelHistoryPanelSpinSeed && !wheelHistoryPanelSpinning" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelSpinSeed }}</code>
          </div>
        </div>
        <div v-if="wheelHistoryPanelCurrentVerificationUrl && !wheelHistoryPanelSpinning" class="wheel-fairness-history__actions">
          <a
            :href="wheelHistoryPanelCurrentVerificationUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="wheel-fairness-history__verify-link"
          >
            {{ t('wheelFairnessVerifyAction') }}
          </a>
        </div>
        <div v-if="wheelHistoryPanelSpinSeed && !wheelHistoryPanelSpinning" class="wheel-fairness-history__note">
          {{ t('wheelFairnessSeedVerifiedNote') }}
        </div>
      </div>
    </div>
    <button
      v-if="wheelHistoryPanelEntries.length"
      type="button"
      class="wheel-fairness-history__toggle"
      @click="wheelHistoryPanelHistoryOpen = !wheelHistoryPanelHistoryOpen"
    >
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" color="success">mdi-history</v-icon>
        <div>
          <div class="wheel-fairness-history__title">{{ t('wheelFairnessRecentHistoryTitle') }}</div>
          <div class="wheel-fairness-history__summary">{{ wheelHistoryPanelSummary }}</div>
        </div>
      </div>
      <v-icon size="small">{{ wheelHistoryPanelHistoryOpen ? 'mdi-chevron-up' : 'mdi-chevron-down' }}</v-icon>
    </button>
    <div v-if="wheelHistoryPanelHistoryOpen && wheelHistoryPanelEntries.length" class="wheel-fairness-history__list">
      <div
        v-for="entry in wheelHistoryPanelEntries"
        :key="`${entry.spinNumber}-${entry.timestamp}`"
        class="wheel-fairness-history__item"
      >
        <div class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">{{ t('wheelFairnessSpinNumberLabel', { count: entry.spinNumber }) }}</div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: entry.color }"></span>
            {{ entry.label }}
          </div>
        </div>
        <div class="wheel-fairness-history__mode">
          {{
            entry.verificationUrl
              ? t('wheelFairnessServerModeLabel')
              : t('wheelFairnessLocalModeLabel')
          }}
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ entry.hash }}</code>
          </div>
          <div v-if="entry.clientSeed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessClientSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ entry.clientSeed }}</code>
          </div>
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ entry.seed }}</code>
          </div>
        </div>
        <div v-if="entry.verificationUrl" class="wheel-fairness-history__actions">
          <a
            :href="entry.verificationUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="wheel-fairness-history__verify-link"
          >
            {{ t('wheelFairnessVerifyAction') }}
          </a>
        </div>
      </div>
    </div>
  </v-card>
</template>

<v-alert v-else-if="showEmptyState" type="info" density="compact" variant="tonal">
  {{ t('wheelFairnessEmptyState') }}
</v-alert>
