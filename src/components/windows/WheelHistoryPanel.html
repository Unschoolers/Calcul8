<template v-if="latestOnly">
  <v-card
    v-if="wheelLatestFairnessEntry"
    variant="outlined"
    class="wheel-fairness-history"
    :class="{ 'wheel-fairness-history--presentation': presentation }"
  >
    <div class="wheel-fairness-history__toggle wheel-fairness-history__toggle--static">
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" :color="wheelLatestFairnessEntry.seed ? 'success' : 'warning'">
          {{ wheelLatestFairnessEntry.seed ? 'mdi-shield-check' : 'mdi-lock' }}
        </v-icon>
        <div>
          <div class="wheel-fairness-history__title">
            {{ wheelLatestFairnessEntry.seed ? t('wheelFairnessVerifiedTitle') : t('wheelFairnessResultLockedTitle') }}
          </div>
          <div class="wheel-fairness-history__summary">
            {{ wheelLatestFairnessEntry.seed ? t('wheelFairnessLatestVerificationSummary') : t('wheelFairnessCommittedSummary') }}
          </div>
        </div>
      </div>
    </div>
    <div class="wheel-fairness-history__list">
      <div class="wheel-fairness-history__item">
        <div class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">
            {{ t('wheelFairnessSpinNumberLabel', { count: wheelLatestFairnessEntry.spinNumber }) }}
          </div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: wheelLatestFairnessEntry.color }"></span>
            {{ wheelLatestFairnessEntry.label }}
          </div>
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelLatestFairnessEntry.hash }}</code>
          </div>
          <div v-if="wheelLatestFairnessEntry.seed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelLatestFairnessEntry.seed }}</code>
          </div>
        </div>
        <div v-if="wheelLatestFairnessEntry.seed" class="wheel-fairness-history__note">
          {{ t('wheelFairnessSeedVerifiedNote') }}
        </div>
      </div>
    </div>
  </v-card>
</template>

<template v-else-if="wheelSpinHash || wheelDisplayFairnessHistory.length">
  <v-card variant="outlined" class="wheel-fairness-history wheel-fairness-history--current">
    <div class="wheel-fairness-history__toggle wheel-fairness-history__toggle--static">
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" :color="wheelFairnessIconColor">{{ wheelFairnessIcon }}</v-icon>
        <div>
          <div class="wheel-fairness-history__title">{{ wheelFairnessTitle }}</div>
          <div class="wheel-fairness-history__summary">
            {{ wheelSpinning ? t('wheelFairnessCommittedSummary') : t('wheelFairnessLatestVerificationSummary') }}
          </div>
        </div>
      </div>
    </div>
    <div v-if="wheelSpinHash" class="wheel-fairness-history__list">
      <div class="wheel-fairness-history__item">
        <div v-if="wheelLastResult" class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">{{ t('wheelFairnessLatestSpinLabel') }}</div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: wheelLastResultColor }"></span>
            {{ wheelLastResult.replace(/^🎉\s*/, '') }}
          </div>
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelSpinHash }}</code>
          </div>
          <div v-if="wheelSpinSeed && !wheelSpinning" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelSpinSeed }}</code>
          </div>
        </div>
        <div v-if="wheelSpinSeed && !wheelSpinning" class="wheel-fairness-history__note">
          {{ t('wheelFairnessSeedVerifiedNote') }}
        </div>
      </div>
    </div>
    <button
      v-if="wheelDisplayFairnessHistory.length"
      type="button"
      class="wheel-fairness-history__toggle"
      @click="wheelFairnessHistoryOpen = !wheelFairnessHistoryOpen"
    >
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" color="success">mdi-history</v-icon>
        <div>
          <div class="wheel-fairness-history__title">{{ t('wheelFairnessRecentHistoryTitle') }}</div>
          <div class="wheel-fairness-history__summary">{{ wheelFairnessHistorySummary }}</div>
        </div>
      </div>
      <v-icon size="small">{{ wheelFairnessHistoryOpen ? 'mdi-chevron-up' : 'mdi-chevron-down' }}</v-icon>
    </button>
    <div v-if="wheelFairnessHistoryOpen && wheelDisplayFairnessHistory.length" class="wheel-fairness-history__list">
      <div
        v-for="entry in wheelDisplayFairnessHistory"
        :key="`${entry.spinNumber}-${entry.timestamp}`"
        class="wheel-fairness-history__item"
      >
        <div class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">{{ t('wheelFairnessSpinNumberLabel', { count: entry.spinNumber }) }}</div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: entry.color }"></span>
            {{ entry.label }}
          </div>
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ entry.hash }}</code>
          </div>
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ entry.seed }}</code>
          </div>
        </div>
      </div>
    </div>
  </v-card>
</template>

<v-alert v-else-if="showEmptyState" type="info" density="compact" variant="tonal">
  {{ t('wheelFairnessEmptyState') }}
</v-alert>
