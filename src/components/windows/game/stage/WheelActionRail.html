<div class="wheel-action-rail">
    <v-btn
        icon
        size="large"
        color="error"
        variant="tonal"
        class="wheel-action-rail__reset"
        :disabled="resetDisabled"
        :title="resetLabel"
        :aria-label="resetLabel"
        @click="$emit('reset-session')"
    >
        <v-icon>mdi-restore</v-icon>
    </v-btn>
    <v-btn
        v-if="showSecondary"
        :color="secondaryActive ? 'secondary' : null"
        :variant="secondaryActive ? 'elevated' : 'tonal'"
        size="large"
        class="wheel-action-rail__secondary"
        :disabled="secondaryDisabled"
        :title="secondaryLabel"
        :aria-label="secondaryLabel"
        @click="$emit('secondary-action')"
    >
        <v-icon>{{ secondaryIcon }}</v-icon>
    </v-btn>
    <v-btn
        color="warning"
        variant="elevated"
        class="wheel-action-rail__primary"
        :disabled="primaryDisabled"
        @click="$emit('primary-spin')"
    >
        <v-icon start>{{ primaryIcon }}</v-icon>
        {{ primaryLabel }}
    </v-btn>
</div>
