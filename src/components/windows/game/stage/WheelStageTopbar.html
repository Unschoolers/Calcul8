<div class="wheel-stage-topbar">
  <div class="wheel-stage-headline">
    <div v-if="wheelPresentationMode" class="wheel-stage-title">{{ wheelStageTitle }}</div>
    <div v-else class="wheel-stage-game-toolbar">
      <v-select
        v-model="activeWheelConfigId"
        :items="wheelConfigItems"
        item-title="title"
        item-value="value"
        :label="t('wheelInspectorActiveWheelLabel')"
        variant="outlined"
        density="compact"
        hide-details="auto"
        class="wheel-stage-game-select"
      ></v-select>
      <v-btn
        icon="mdi-plus"
        size="small"
        variant="text"
        :title="t('wheelInspectorNewGameAction')"
        :aria-label="t('wheelInspectorNewGameAction')"
        class="wheel-stage-game-action"
        @click="openWheelCreateDialog"
      ></v-btn>
      <v-btn
        icon="mdi-pencil-outline"
        size="small"
        variant="text"
        :title="t('wheelInspectorEditWheelAction')"
        :aria-label="t('wheelInspectorEditWheelAction')"
        :disabled="!activeWheelConfig"
        class="wheel-stage-game-action"
        @click="openWheelManageDialog"
      ></v-btn>
    </div>
    <div class="wheel-stage-utility-controls">
      <div class="wheel-effects-controls" role="group" :aria-label="t('wheelEffectsControlsLabel')">
        <v-btn
          size="x-small"
          :icon="wheelSoundEnabled ? 'mdi-volume-high' : 'mdi-volume-off'"
          :color="wheelSoundEnabled ? null : 'warning'"
          variant="text"
          :title="wheelSoundToggleTitle"
          :aria-label="wheelSoundToggleTitle"
          class="wheel-effects-toggle"
          @click="toggleWheelSound"
        ></v-btn>
        <v-btn
          size="x-small"
          :icon="wheelReducedMotion ? 'mdi-motion-pause-outline' : 'mdi-motion-play-outline'"
          :color="wheelReducedMotion ? 'warning' : null"
          variant="text"
          :title="wheelMotionToggleTitle"
          :aria-label="wheelMotionToggleTitle"
          class="wheel-effects-toggle"
          @click="toggleWheelReducedMotion"
        ></v-btn>
      </div>
      <v-btn
        size="x-small"
        :icon="wheelPresentationMode ? 'mdi-arrow-collapse-all' : 'mdi-arrow-expand-all'"
        variant="text"
        :title="wheelPresentationToggleTitle"
        class="wheel-presentation-toggle"
        @click="wheelPresentationMode = !wheelPresentationMode"
      ></v-btn>
    </div>
    <v-menu location="bottom end" content-class="wheel-stage-game-menu" :close-on-content-click="true">
      <template #activator="{ props }">
        <v-btn
          v-bind="props"
          icon="mdi-dots-vertical"
          size="small"
          variant="text"
          :title="t('wheelGameActionsLabel')"
          :aria-label="t('wheelGameActionsLabel')"
          class="wheel-stage-more-action"
        ></v-btn>
      </template>
      <v-list density="compact" class="wheel-stage-game-menu-list">
        <v-list-item
          prepend-icon="mdi-plus"
          :title="t('wheelInspectorNewGameAction')"
          @click="openWheelCreateDialog"
        ></v-list-item>
        <v-list-item
          prepend-icon="mdi-pencil-outline"
          :title="t('wheelInspectorEditWheelAction')"
          :disabled="!activeWheelConfig"
          @click="openWheelManageDialog"
        ></v-list-item>
        <v-divider></v-divider>
        <v-list-item
          :prepend-icon="wheelSoundEnabled ? 'mdi-volume-high' : 'mdi-volume-off'"
          :title="wheelSoundToggleTitle"
          @click="toggleWheelSound"
        ></v-list-item>
        <v-list-item
          :prepend-icon="wheelReducedMotion ? 'mdi-motion-pause-outline' : 'mdi-motion-play-outline'"
          :title="wheelMotionToggleTitle"
          @click="toggleWheelReducedMotion"
        ></v-list-item>
        <v-list-item
          :prepend-icon="wheelPresentationMode ? 'mdi-arrow-collapse-all' : 'mdi-arrow-expand-all'"
          :title="wheelPresentationToggleTitle"
          @click="wheelPresentationMode = !wheelPresentationMode"
        ></v-list-item>
      </v-list>
    </v-menu>
  </div>
  <div v-if="!wheelPresentationMode" class="wheel-stage-commandbar">
    <div class="wheel-stage-pills">
      <span class="wheel-stage-pill">{{ wheelStageSlotsLabel }}</span>
      <span v-if="wheelDisplayConfig" class="wheel-stage-pill">{{ wheelStageSpinPriceLabel }}</span>
      <span v-if="wheelIsCompactLayout" class="wheel-stage-pill wheel-stage-pill--kpi">
        <span class="wheel-stage-pill__label">{{ wheelCompactStageSummaryLabel }}</span>
        <strong class="wheel-stage-pill__value" :style="{ color: wheelCompactStageSummaryColor }">
          {{ wheelCompactStageSummaryValue }}
        </strong>
      </span>
    </div>
    <div class="wheel-stage-actions">
      <v-btn-toggle
        :model-value="wheelMode"
        mandatory
        density="comfortable"
        divided
        class="wheel-mode-toggle"
        @update:model-value="handleWheelModeChange"
      >
        <v-btn value="config" size="small" :class="{ 'wheel-mode-toggle__btn--active-config': wheelMode === 'config' }">
          <v-icon start size="small">mdi-tune</v-icon>
          <span class="wheel-mode-toggle__label">{{ t('wheelConfigModeLabel') }}</span>
        </v-btn>
        <v-btn value="live" size="small" :class="{ 'wheel-mode-toggle__btn--active-live': wheelMode === 'live' }">
          <v-icon start size="small">mdi-broadcast</v-icon>
          <span class="wheel-mode-toggle__label">{{ t('wheelLiveModeLabel') }}</span>
        </v-btn>
      </v-btn-toggle>
      <v-btn
        size="small"
        :variant="gameSpectatorSessionStatus === 'ended' ? 'elevated' : 'tonal'"
        prepend-icon="mdi-qrcode"
        class="game-spectator-btn"
        :class="{
          'game-spectator-btn--inactive': !gameSpectatorSessionId,
          'game-spectator-btn--live': gameSpectatorSessionId && gameSpectatorSessionStatus !== 'ended',
          'game-spectator-btn--ended': gameSpectatorSessionStatus === 'ended'
        }"
        :color="gameSpectatorSessionId ? (gameSpectatorSessionStatus === 'ended' ? 'warning' : 'success') : null"
        :title="gameSpectatorActionLabel"
        @click="openGameSpectatorDialog"
      >
        <span class="game-spectator-btn__label">{{ gameSpectatorActionLabel }}</span>
      </v-btn>
    </div>
  </div>
</div>
