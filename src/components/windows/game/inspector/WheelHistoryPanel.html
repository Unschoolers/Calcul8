<template v-if="latestOnly">
  <v-card
    v-if="wheelHistoryPanelModel.latestEntry"
    variant="outlined"
    class="wheel-fairness-history"
    :class="{ 'wheel-fairness-history--presentation': presentation }"
  >
    <div class="wheel-fairness-history__toggle wheel-fairness-history__toggle--static">
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" :color="wheelHistoryPanelModel.latestEntry.seed ? 'success' : 'warning'">
          {{ wheelHistoryPanelModel.latestEntry.seed ? 'mdi-shield-check' : 'mdi-lock' }}
        </v-icon>
        <div>
          <div class="wheel-fairness-history__title">
            {{
              !wheelHistoryPanelModel.latestEntry.seed
                ? t('wheelFairnessResultLockedTitle')
                : wheelHistoryPanelModel.latestEntry.verificationUrl
                  ? t('wheelFairnessServerVerifiedTitle')
                  : t('wheelFairnessLocalVerifiedTitle')
            }}
          </div>
          <div class="wheel-fairness-history__summary">
            {{
              !wheelHistoryPanelModel.latestEntry.seed
                ? t('wheelFairnessCommittedSummary')
                : wheelHistoryPanelModel.latestEntry.verificationUrl
                  ? t('wheelFairnessServerVerificationSummary')
                  : t('wheelFairnessLocalVerificationSummary')
            }}
          </div>
        </div>
      </div>
    </div>
    <div class="wheel-fairness-history__list">
      <div class="wheel-fairness-history__item">
        <div class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">
            {{ t('wheelFairnessSpinNumberLabel', { count: wheelHistoryPanelModel.latestEntry.spinNumber }) }}
          </div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: wheelHistoryPanelModel.latestEntry.color }"></span>
            {{ wheelHistoryPanelModel.latestEntry.label }}
          </div>
        </div>
        <div
          v-if="wheelHistoryPanelModel.latestEntry.seed"
          class="wheel-fairness-history__mode"
        >
          {{
            wheelHistoryPanelModel.latestEntry.verificationUrl
              ? t('wheelFairnessServerModeLabel')
              : t('wheelFairnessLocalModeLabel')
          }}
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelModel.latestEntry.hash }}</code>
          </div>
          <div v-if="wheelHistoryPanelModel.latestEntry.clientSeed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessClientSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelModel.latestEntry.clientSeed }}</code>
          </div>
          <div v-if="wheelHistoryPanelModel.latestEntry.seed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelModel.latestEntry.seed }}</code>
          </div>
        </div>
        <div v-if="wheelHistoryPanelModel.latestEntry.verificationUrl" class="wheel-fairness-history__actions">
          <a
            :href="wheelHistoryPanelModel.latestEntry.verificationUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="wheel-fairness-history__verify-link"
          >
            {{ t('wheelFairnessVerifyAction') }}
          </a>
        </div>
        <div v-if="wheelHistoryPanelModel.latestEntry.seed" class="wheel-fairness-history__note">
          {{ t('wheelFairnessSeedVerifiedNote') }}
        </div>
      </div>
    </div>
  </v-card>
</template>

<template v-else-if="wheelHistoryPanelModel.spinHash || wheelHistoryPanelModel.hasEntries">
  <v-card variant="outlined" class="wheel-fairness-history wheel-fairness-history--current">
    <div class="wheel-fairness-history__toggle wheel-fairness-history__toggle--static">
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" :color="wheelHistoryPanelModel.iconColor">{{ wheelHistoryPanelModel.icon }}</v-icon>
        <div>
          <div class="wheel-fairness-history__title">{{ wheelHistoryPanelModel.title }}</div>
          <div class="wheel-fairness-history__summary">
            {{ wheelHistoryPanelModel.summaryText }}
          </div>
        </div>
      </div>
    </div>
    <div v-if="wheelHistoryPanelModel.spinHash" class="wheel-fairness-history__list">
      <div class="wheel-fairness-history__item">
        <div v-if="wheelHistoryPanelModel.lastResult" class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">{{ t('wheelFairnessLatestSpinLabel') }}</div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: wheelHistoryPanelModel.lastResultColor }"></span>
            {{ wheelHistoryPanelModel.lastResultClean }}
          </div>
        </div>
        <div
          v-if="wheelHistoryPanelModel.spinSeed && !wheelHistoryPanelModel.spinning"
          class="wheel-fairness-history__mode"
        >
          {{
            wheelHistoryPanelModel.verificationUrl
              ? t('wheelFairnessServerModeLabel')
              : t('wheelFairnessLocalModeLabel')
          }}
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelModel.spinHash }}</code>
          </div>
          <div v-if="wheelHistoryPanelModel.spinClientSeed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessClientSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelModel.spinClientSeed }}</code>
          </div>
          <div v-if="wheelHistoryPanelModel.spinSeed && !wheelHistoryPanelModel.spinning" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ wheelHistoryPanelModel.spinSeed }}</code>
          </div>
        </div>
        <div v-if="wheelHistoryPanelModel.verificationUrl && !wheelHistoryPanelModel.spinning" class="wheel-fairness-history__actions">
          <a
            :href="wheelHistoryPanelModel.verificationUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="wheel-fairness-history__verify-link"
          >
            {{ t('wheelFairnessVerifyAction') }}
          </a>
        </div>
        <div v-if="wheelHistoryPanelModel.spinSeed && !wheelHistoryPanelModel.spinning" class="wheel-fairness-history__note">
          {{ t('wheelFairnessSeedVerifiedNote') }}
        </div>
      </div>
    </div>
    <button
      v-if="wheelHistoryPanelModel.hasEntries"
      type="button"
      class="wheel-fairness-history__toggle"
      @click="wheelHistoryPanelHistoryOpen = !wheelHistoryPanelHistoryOpen"
    >
      <div class="wheel-fairness-history__heading">
        <v-icon size="small" color="success">mdi-history</v-icon>
        <div>
          <div class="wheel-fairness-history__title">{{ t('wheelFairnessRecentHistoryTitle') }}</div>
          <div class="wheel-fairness-history__summary">{{ wheelHistoryPanelModel.summary }}</div>
        </div>
      </div>
      <v-icon size="small">{{ wheelHistoryPanelHistoryOpen ? 'mdi-chevron-up' : 'mdi-chevron-down' }}</v-icon>
    </button>
    <div v-if="wheelHistoryPanelHistoryOpen && wheelHistoryPanelModel.hasEntries" class="wheel-fairness-history__list">
      <div
        v-for="entry in wheelHistoryPanelModel.entries"
        :key="`${entry.spinNumber}-${entry.timestamp}`"
        class="wheel-fairness-history__item"
      >
        <div class="wheel-fairness-history__item-top">
          <div class="wheel-fairness-history__spin">{{ t('wheelFairnessSpinNumberLabel', { count: entry.spinNumber }) }}</div>
          <div class="wheel-fairness-history__result">
            <span class="wheel-fairness-history__dot" :style="{ background: entry.color }"></span>
            {{ entry.label }}
          </div>
        </div>
        <div class="wheel-fairness-history__mode">
          {{
            entry.verificationUrl
              ? t('wheelFairnessServerModeLabel')
              : t('wheelFairnessLocalModeLabel')
          }}
        </div>
        <div class="wheel-fairness-history__codes">
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessHashLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ entry.hash }}</code>
          </div>
          <div v-if="entry.clientSeed" class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessClientSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ entry.clientSeed }}</code>
          </div>
          <div class="wheel-fairness-history__code-block">
            <span class="wheel-fairness-history__code-label">{{ t('wheelFairnessSeedLabel') }}</span>
            <code class="wheel-fairness-history__code">{{ entry.seed }}</code>
          </div>
        </div>
        <div v-if="entry.verificationUrl" class="wheel-fairness-history__actions">
          <a
            :href="entry.verificationUrl"
            target="_blank"
            rel="noopener noreferrer"
            class="wheel-fairness-history__verify-link"
          >
            {{ t('wheelFairnessVerifyAction') }}
          </a>
        </div>
      </div>
    </div>
  </v-card>
</template>

<v-alert v-else-if="showEmptyState" type="info" density="compact" variant="tonal">
  {{ t('wheelFairnessEmptyState') }}
</v-alert>
