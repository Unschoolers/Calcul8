<v-card elevation="0" rounded="xl" class="live-pricing-card">
  <v-card-text class="pa-3 live-pricing-card__body">
    <div class="live-pricing-card__hero">
      <div class="live-pricing-card__identity">
        <v-icon color="white" size="18">{{ icon }}</v-icon>
        <div class="live-pricing-card__identity-copy">
          <div class="live-pricing-card__label-cluster">
            <div class="live-pricing-card__label">{{ label }}</div>
          </div>
          <div v-if="helperText" class="live-pricing-card__helper">
            {{ helperText }}
          </div>
        </div>
      </div>

      <div class="live-pricing-card__price-row">
        <v-btn
          icon="mdi-minus"
          size="small"
          color="error"
          variant="tonal"
          :title="priceAdjustLabel(-1)"
          :aria-label="priceAdjustLabel(-1)"
          @click="changePrice(-1)"
          class="live-pricing-card__control-button"
        ></v-btn>

        <div class="live-pricing-card__hero-price">
          <div class="live-pricing-card__price">${{ formatCurrency(modelValue) }}</div>
          <v-chip
            :color="displayProfit() >= 0 ? 'success' : 'error'"
            size="small"
            class="live-pricing-card__profit-chip live-pricing-card__profit-chip--center"
          >
            {{ displayProfit() >= 0 ? '+' : '' }}${{ formatCurrency(displayProfit()) }}
            ({{ formatCurrency(displayProfitPercent(), 1) }}%)
          </v-chip>
        </div>

        <v-btn
          icon="mdi-plus"
          size="small"
          color="success"
          variant="tonal"
          :title="priceAdjustLabel(1)"
          :aria-label="priceAdjustLabel(1)"
          @click="changePrice(1)"
          class="live-pricing-card__control-button"
        ></v-btn>
      </div>
    </div>

    <div class="live-pricing-card__target-summary">
      <template v-if="avgPriceNeeded == null || neededDisplayProfit() == null || currentPriceGap() == null">
        <div class="live-pricing-card__empty-target">
          <v-icon size="16">mdi-target-variant</v-icon>
          <span>{{ noTargetLabel() }}</span>
        </div>
      </template>
      <template v-else-if="shouldShowTargetDecision()">
        <div class="live-pricing-card__decision-tile live-pricing-card__metric-tile live-pricing-card__metric-tile--needed">
          <div class="live-pricing-card__decision-head">
            <div class="live-pricing-card__decision-title">{{ targetDecisionLabel() }}</div>
          </div>
          <div class="live-pricing-card__decision-main">
            <div class="live-pricing-card__decision-price">${{ formatCurrency(avgPriceNeeded)  }}</div>
            <div
              class="live-pricing-card__decision-gap"
              :class="(adjustmentNeeded() || 0) >= 0 ? 'text-success' : 'text-error'"
            >
              {{ targetDecisionAdjustmentLabel() }}
              {{ (adjustmentNeeded() || 0) >= 0 ? '+' : '' }}${{ formatAt(adjustmentNeeded() || 0) }} 
            </div>
          </div>
          <div class="live-pricing-card__decision-outcome">
            <div class="live-pricing-card__decision-kicker">{{ targetDecisionProfitLabel() }}</div>
            <div class="live-pricing-card__decision-outcome-values">
              <div
                class="live-pricing-card__decision-outcome-profit"
                :class="(neededDisplayProfit() || 0) >= 0 ? 'text-success' : 'text-error'"
              >
                {{ (neededDisplayProfit() || 0) >= 0 ? '+' : '' }}${{ formatAt(neededDisplayProfit() || 0) }}
              </div>
              <div class="live-pricing-card__decision-outcome-percent">
                {{ formatCurrency(neededDisplayPercent() || 0, 1) }}%
              </div>
            </div>
          </div>
        </div>
      </template>
      <template v-else>
        <div class="live-pricing-card__decision-tile live-pricing-card__decision-tile--success">
          <div class="live-pricing-card__status-head">
            <v-icon size="16" color="success">mdi-check-circle</v-icon>
            <div class="live-pricing-card__status-title">{{ onTargetLabel() }}</div>
          </div>
          <div class="live-pricing-card__status-body">
            {{ onTargetSummaryLabel() }}
          </div>
        </div>
      </template>
    </div>

    <div class="live-pricing-card__scenario-grid">
      <button
        v-for="offset in scenarioOffsets()"
        :key="offset"
        type="button"
        class="live-pricing-card__scenario-tile"
        :class="scenarioTileClass(offset)"
        :style="scenarioTileStyle(offset)"
        @click="selectScenarioPrice(offset)"
      >
        <div class="live-pricing-card__scenario-main">
          <span class="live-pricing-card__scenario-chip">{{ scenarioDeltaLabel(offset) }}</span>
          <span class="live-pricing-card__scenario-price">${{ formatCurrency(modelValue + offset) }}</span>
          <span class="live-pricing-card__scenario-percent">
            {{ formatCurrency(displayProfitPercentAtPrice(modelValue + offset), 1) }}%
          </span>
        </div>
        <div class="live-pricing-card__scenario-detail">
          <span class="live-pricing-card__scenario-detail-label">{{ targetProfitShortLabel() }}</span>
          <span class="live-pricing-card__scenario-profit" :class="displayProfitAtPrice(modelValue + offset) >= 0 ? 'text-success' : 'text-error'">
            {{ displayProfitAtPrice(modelValue + offset) >= 0 ? '+' : '' }}${{ formatCurrency(displayProfitAtPrice(modelValue + offset)) }}
          </span>
        </div>
      </button>
    </div>
  </v-card-text>
</v-card>
