<v-app>
      <template v-if="isGoogleSignedIn">
        <app-shell-top-bar :ctx="this"></app-shell-top-bar>

        <v-main id="app-main" tabindex="-1">
          <v-container fluid class="pa-4 app-shell fill-height">
            <v-alert v-if="isOffline" type="warning" variant="tonal" density="compact" class="mb-3">
              {{ t('shellOfflineNotice') }}
            </v-alert>

            <lot-selector-onboarding-block :ctx="this"></lot-selector-onboarding-block>


            <!-- Tab Content -->
            <div :class="{ 'interaction-disabled': !hasLotSelected }"
              :style="!hasLotSelected ? 'pointer-events: none;' : null">
              <v-window v-model="currentTab"
                :class="['tabs-window', { 'tabs-window--allow-sticky': currentTab === 'wheel' || (currentLotType === 'singles' && (currentTab === 'live' || currentTab === 'config')) }]"
                transition="tab-slide-fast" reverse-transition="tab-slide-fast-reverse">
                <!-- CONFIG -->
                <v-window-item key="config" value="config" eager>
                  <singles-config-window v-if="hasLotSelected && currentLotType === 'singles'" ref="singlesConfigWindow"
                    :ctx="$root"></singles-config-window>
                  <config-window v-else :ctx="$root"></config-window>
                </v-window-item>

                <!-- LIVE -->
                <v-window-item key="live" value="live" eager>
                  <live-window ref="liveWindow" :ctx="$root"></live-window>
                </v-window-item>

                <!-- SALES -->
                <v-window-item key="sales" value="sales" eager>
                  <sales-window ref="salesWindow" :ctx="$root"></sales-window>
                </v-window-item>

                <!-- WHEEL -->
                <v-window-item key="wheel" value="wheel" eager>
                  <wheel-window ref="wheelWindow" :ctx="$root"></wheel-window>
                </v-window-item>

                <!-- PORTFOLIO -->
                <v-window-item key="portfolio" value="portfolio" eager>
                  <portfolio-window ref="portfolioWindow" :ctx="$root"></portfolio-window>
                </v-window-item>

              </v-window>
            </div>

            
          </v-container>

          <!-- Bottom Nav -->
          <v-bottom-navigation v-model="currentTab" color="primary" grow elevation="8" mandatory
            :aria-label="t('shellPrimaryNavigationAriaLabel')">
            <v-btn value="config" :ripple="false">
              <v-icon>mdi-cog</v-icon>
              <span>{{ t('shellNavConfigLabel') }}</span>
            </v-btn>
            <v-btn value="live" :disabled="isLiveTabDisabled" :ripple="false">
              <v-icon>mdi-target</v-icon>
              <span>{{ t('shellNavLiveLabel') }}</span>
            </v-btn>

            <v-btn value="sales" :disabled="!hasLotSelected" :ripple="false">
              <v-icon>mdi-chart-line</v-icon>
              <span>{{ t('shellNavSalesLabel') }}</span>
            </v-btn>

            <v-btn value="wheel" :disabled="!hasLotSelected" :ripple="false">
              <v-icon>mdi-tire</v-icon>
              <span>{{ t('shellNavWheelLabel') }}</span>
            </v-btn>

            <v-btn value="portfolio" :disabled="!hasLotSelected" :ripple="false">
              <v-icon>mdi-briefcase-outline</v-icon>
              <span>{{ t('shellNavPortfolioLabel') }}</span>
            </v-btn>



          </v-bottom-navigation>
        </v-main>

        <v-fab
          v-if="currentTab === 'config' && currentLotType === 'singles'"
          id="guided-onboarding-singles-add-fab"
          data-driver-target="guided-onboarding-singles-add-fab"
          icon="mdi-plus"
          color="primary"
          size="large"
          :title="t('shellAddSinglesPurchaseAction')"
          :aria-label="t('shellAddSinglesPurchaseAction')"
          :disabled="!hasLotSelected"
          @click="$refs.singlesConfigWindow?.handleAddSinglesPurchase?.()"
          class="fab-primary fab-add-preset"
        ></v-fab>

        <v-fab v-if="currentTab === 'live'" icon="mdi-calculator" color="secondary" size="large"
          :title="hasProAccess ? t('shellPriceCalculatorAction') : t('shellUpgradePriceCalculatorAction')"
          :aria-label="hasProAccess ? t('shellPriceCalculatorAction') : t('shellUpgradePriceCalculatorAction')"
          :disabled="!hasLotSelected" @click="accessProFeature('autoCalculate')"
          class="fab-primary fab-live-calc"></v-fab>

        <v-fab v-if="currentTab === 'live' && currentLotType === 'singles'" icon="mdi-broom" color="error" size="large"
          :title="t('shellClearLiveSinglesAction')" :aria-label="t('shellClearLiveSinglesAction')"
          :disabled="!hasLotSelected || effectiveLiveSinglesIds.length === 0" @click="askConfirmation(
          {
            title: t('shellClearLiveSinglesConfirmTitle'),
            text: t('shellClearLiveSinglesConfirmBody'),
            color: 'error'
          },
          () => clearLiveSinglesSelection()
        )" class="fab-primary fab-live-clear"></v-fab>

        <v-fab v-if="currentTab === 'live'" icon="mdi-restore" color="surface" size="large"
          :title="currentLotType === 'singles' ? t('shellResetLiveSinglesPricesAction') : t('shellResetLivePricesAction')"
          :aria-label="currentLotType === 'singles' ? t('shellResetLiveSinglesPricesAction') : t('shellResetLivePricesAction')"
          @click="resetLivePrices" class="fab-primary fab-live-reset"></v-fab>

        <v-fab v-if="currentTab === 'live' && currentLotType !== 'singles'" icon="mdi-content-save-outline"
          color="primary" size="large" :title="t('shellApplyLivePricesAction')" :aria-label="t('shellApplyLivePricesAction')"
          :disabled="!hasLotSelected" @click="applyLivePricesToDefaults" class="fab-primary fab-calculate"></v-fab>

        <div
          v-if="currentTab === 'wheel'
            && $refs.wheelWindow?.wheelIsCompactLayout
            && !$refs.wheelWindow?.wheelPresentationMode
            && !$refs.wheelWindow?.wheelMobileInspectorOpen"
          class="fab-overflow-wrap fab-wheel-stack"
        >
          <v-fab
            v-for="action in ($refs.wheelWindow?.wheelCompactFabActions || [])"
            :key="action.id"
            :icon="action.icon"
            :color="action.color"
            size="large"
            :title="action.title"
            :aria-label="action.title"
            :disabled="action.disabled"
            @click="action.actionType === 'end'
              ? $refs.wheelWindow?.requestWheelSessionEnd?.()
              : $refs.wheelWindow?.openWheelInspector?.(action.targetTab)"
            class="fab-primary"
          ></v-fab>
        </div>

        <!-- Primary FAB - Sales -->
        <div v-if="currentTab === 'sales' && hasProAccess" class="fab-overflow-wrap fab-overflow-sales">
          <v-speed-dial v-model="speedDialOpenSales" location="top center" transition="scale-transition"
            :open-on-hover="false" :close-on-content-click="false">
            <template v-slot:activator="{ props: activatorProps }">
              <v-fab v-bind="activatorProps" icon="mdi-cart-plus" color="primary" size="large" :title="t('saleEditorAddTitle')"
                :aria-label="t('saleEditorAddTitle')" :disabled="!hasLotSelected"></v-fab>
            </template>

            <v-btn v-if="currentLotType === 'singles'" :key="'card'" icon="mdi-cards-outline" color="primary"
              variant="elevated" size="small" class="sales-speed-action" :title="t('shellAddItemSaleAction')"
              :aria-label="t('shellAddItemSaleAction')" :disabled="!hasLotSelected"
              @click="openAddSaleModal('pack'); speedDialOpenSales = false"></v-btn>
            <template v-else>
              <v-btn :key="'item'" icon="mdi-tag-outline" color="primary" variant="elevated" size="small"
                class="sales-speed-action" :title="t('shellAddItemSaleAction')" :aria-label="t('shellAddItemSaleAction')"
                :disabled="!hasLotSelected" @click="openAddSaleModal('pack'); speedDialOpenSales = false"></v-btn>
              <v-btn :key="'box'" icon="mdi-cube-outline" color="secondary" variant="elevated" size="small"
                class="sales-speed-action" :title="t('shellAddBoxSaleAction')" :aria-label="t('shellAddBoxSaleAction')"
                :disabled="!hasLotSelected" @click="openAddSaleModal('box'); speedDialOpenSales = false"></v-btn>
              <v-btn :key="'rtyh'" icon="mdi-cards-playing-outline" color="success" variant="elevated" size="small"
                class="sales-speed-action" :title="t('shellAddRtyhSaleAction')" :aria-label="t('shellAddRtyhSaleAction')"
                :disabled="!hasLotSelected" @click="openAddSaleModal('rtyh'); speedDialOpenSales = false"></v-btn>
            </template>
          </v-speed-dial>
        </div>

        <v-fab v-else-if="currentTab === 'sales'" icon="mdi-cart-plus" color="primary" size="large"
          :title="t('shellUpgradeSalesTrackingAction')" :aria-label="t('shellUpgradeSalesTrackingAction')"
          :disabled="!hasLotSelected" @click="accessProFeature('salesTracking')" class="fab-primary"></v-fab>

        <v-fab v-if="currentTab === 'portfolio'" icon="mdi-table" color="primary" size="large" :title="!hasPortfolioData
          ? t('shellOpenPortfolioReportAction')
          : (hasProAccess ? t('shellOpenPortfolioReportAction') : t('shellUpgradePortfolioReportAction'))" :aria-label="!hasPortfolioData
          ? t('shellOpenPortfolioReportAction')
          : (hasProAccess ? t('shellOpenPortfolioReportAction') : t('shellUpgradePortfolioReportAction'))"
          :disabled="!hasPortfolioData" @click="accessProFeature('portfolioReport')"
          class="fab-primary fab-portfolio-report"></v-fab>

        <workspace-modals :ctx="this"></workspace-modals>

        <!-- New Lot Modal -->
        <v-dialog v-model="showNewLotModal" max-width="400">
          <v-card id="guided-onboarding-new-lot-card" data-driver-target="guided-onboarding-new-lot-card">
            <v-card-title>{{ t('newLotTitle') }}</v-card-title>
            <v-card-text>
              <v-text-field id="guided-onboarding-lot-name-field" v-model="lotNameDraft" :label="t('lotNameLabel')" variant="outlined"
                @keyup.enter="createNewLot"></v-text-field>
              <v-btn-toggle v-model="newLotType" mandatory divided density="compact" variant="outlined"
                class="mt-2 segment-toggle">
                <v-btn value="bulk" size="small">{{ t('commonBulk') }}</v-btn>
                <v-btn value="singles" size="small">{{ t('commonSingles') }}</v-btn>
              </v-btn-toggle>
              <div v-if="newLotType === 'singles'" class="mt-3">
                <div class="text-caption text-medium-emphasis mb-2">{{ t('itemCatalogSourceLabel') }}</div>
                <v-btn-toggle v-model="newLotCatalogSource" mandatory divided density="compact" variant="outlined"
                  class="segment-toggle">
                  <v-btn value="ua" size="small">{{ t('itemCatalogUnionArena') }}</v-btn>
                  <v-btn value="pokemon" size="small">{{ t('itemCatalogPokemon') }}</v-btn>
                  <v-btn value="none" size="small">{{ t('itemCatalogCustom') }}</v-btn>
                </v-btn-toggle>
              </div>
            </v-card-text>
            <v-card-actions>
              <v-spacer></v-spacer>
              <v-btn text @click="showNewLotModal = false">{{ t('commonCancel') }}</v-btn>
              <v-btn id="guided-onboarding-create-lot-btn" color="primary" @click="createNewLot">{{ t('commonCreate') }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <!-- Edit Lot Modal -->
        <v-dialog v-model="showRenameLotModal" max-width="400">
          <v-card>
            <v-card-title>{{ t('editLotTitle') }}</v-card-title>
            <v-card-text>
              <v-text-field v-model="renameLotName" :label="t('lotNameLabel')" variant="outlined"
                @keyup.enter="renameCurrentLot"></v-text-field>
              <div v-if="currentLotType === 'singles'" class="mt-3">
                <div class="text-caption text-medium-emphasis mb-2">{{ t('itemCatalogSourceLabel') }}</div>
                <v-btn-toggle :model-value="currentLotCatalogSource" mandatory divided density="compact"
                  variant="outlined" class="segment-toggle" @update:model-value="setCurrentLotCatalogSource">
                  <v-btn value="ua" size="small">{{ t('itemCatalogUnionArena') }}</v-btn>
                  <v-btn value="pokemon" size="small">{{ t('itemCatalogPokemon') }}</v-btn>
                  <v-btn value="none" size="small">{{ t('itemCatalogCustom') }}</v-btn>
                </v-btn-toggle>
                <div class="text-caption text-medium-emphasis mt-2">
                  {{
                  currentLotCatalogSource === 'none'
                  ? t('itemCatalogAutocompleteDisabledHelp')
                  : t('itemCatalogAutocompleteEnabledHelp')
                  }}
                </div>
              </div>
            </v-card-text>
            <v-card-actions>
              <v-btn variant="text" color="error" :disabled="!currentLotId"
                @click="showRenameLotModal = false; deleteCurrentLot()">
                {{ t('commonDelete') }}
              </v-btn>
              <v-spacer></v-spacer>
              <v-btn text @click="showRenameLotModal = false">{{ t('commonCancel') }}</v-btn>
              <v-btn color="primary" @click="renameCurrentLot">{{ t('commonSave') }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <!-- Verify Play Purchase Modal -->
        <v-dialog v-if="showManualPurchaseVerify" v-model="showVerifyPurchaseModal" max-width="520">
          <v-card>
            <v-card-title>
              <v-icon class="mr-2">mdi-check-decagram</v-icon>
              {{ t('purchaseVerifyTitle') }}
            </v-card-title>
            <v-card-text>
              <v-text-field v-model="purchaseTokenInput" :label="t('purchaseTokenLabel')" variant="outlined" autocomplete="off"
                class="mb-2" :hint="t('purchaseTokenHint')" persistent-hint></v-text-field>
              <v-text-field v-model="purchaseProductIdInput" :label="t('purchaseProductIdOptionalLabel')" variant="outlined"
                autocomplete="off" class="mb-2"></v-text-field>
              <v-text-field v-model="purchasePackageNameInput" :label="t('purchasePackageNameOptionalLabel')" variant="outlined"
                autocomplete="off"></v-text-field>
            </v-card-text>
            <v-card-actions>
              <v-spacer></v-spacer>
              <v-btn text @click="showVerifyPurchaseModal = false">{{ t('commonCancel') }}</v-btn>
              <v-btn color="primary" :loading="isVerifyingPurchase" @click="verifyProPurchase">{{ t('purchaseVerifySubmitAction') }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <!-- Embedded Stripe Checkout Modal -->
        <v-dialog v-model="showStripeCheckoutModal" max-width="560" :fullscreen="$vuetify?.display?.smAndDown"
          persistent>
          <v-card>
            <v-card-title>
              <v-icon class="mr-2">mdi-credit-card-lock-outline</v-icon>
              {{ t('stripeCheckoutTitle') }}
            </v-card-title>
            <v-card-text>
              <div id="stripe-embedded-checkout" class="stripe-embedded-checkout"></div>
            </v-card-text>
            <v-card-actions>
              <v-spacer></v-spacer>
              <v-btn text @click="closeStripeCheckoutModal">{{ t('stripeCheckoutCancelAction') }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <!-- Profit Calculator Modal -->
        <auto-calculate-modal :ctx="this"></auto-calculate-modal>

        <!-- Add/Edit Sale Modal -->
        <v-dialog v-model="showAddSaleModal" max-width="560" class="sale-editor-dialog" scrollable
          :fullscreen="$vuetify?.display?.smAndDown" transition="dialog-bottom-transition">
          <v-card class="sale-editor-card">
            <v-card-title class="sale-editor-title">
              <div class="d-flex align-center">
                <v-icon class="mr-2">mdi-cart-plus</v-icon>
                <div>
                  <div>{{ editingSale ? t('saleEditorEditTitle') : t('saleEditorAddTitle') }}</div>
                  <div class="text-caption text-medium-emphasis">
                    {{ currentLotType === 'singles' ? t('saleEditorSinglesSubtitle') : t('saleEditorBulkSubtitle') }}
                  </div>
                </div>
              </div>
            </v-card-title>
            <v-card-text class="sale-editor-content">
              <v-alert v-if="hasLotSelected && !hasProAccess" type="info" variant="tonal" density="compact"
                icon="mdi-lock" class="mb-3">
                {{ t('saleEditorLockedNotice') }}
                <div class="mt-2">
                  <v-btn size="small" color="primary" variant="flat" prepend-icon="mdi-google-play"
                    :loading="isVerifyingPurchase" @click="startProPurchase">
                    {{ t('saleEditorUnlockProAction') }}
                  </v-btn>
                </div>
                <div v-if="showManualPurchaseVerify" class="mt-2">
                  <v-btn size="small" variant="text" prepend-icon="mdi-check-decagram" @click="openVerifyPurchaseModal">
                    {{ t('saleEditorVerifyPurchaseAction') }}
                  </v-btn>
                </div>
              </v-alert>

              <div class="sale-editor-form">
                <div v-if="currentLotType === 'singles'" class="sale-editor-section sale-editor-section--singles">
                  <div class="sale-editor-section-label">{{ t('saleEditorItemsSoldSectionLabel') }}</div>
                  <div class="sale-editor-singles-lines">
                    <div v-for="(line, lineIndex) in (newSale.singlesItems || [])" :key="line.lineId || lineIndex"
                      class="sale-editor-singles-line">
                      <div class="sale-editor-line-layout">
                        <div v-if="singlesSaleCardOptions.find(o => o.value === line.singlesPurchaseEntryId)?.image"
                          class="sale-editor-line-thumb-col">
                          <img :src="singlesSaleCardOptions.find(o => o.value === line.singlesPurchaseEntryId)?.image"
                            :alt="singlesSaleCardOptions.find(o => o.value === line.singlesPurchaseEntryId)?.item"
                            class="sale-editor-line-thumb" loading="lazy"
                            @error="$event.target.closest('.sale-editor-line-thumb-col').style.display='none'" />
                        </div>
                        <div class="sale-editor-line-fields">
                          <v-row dense class="sale-editor-singles-grid">
                            <v-col :cols="$vuetify?.display?.smAndDown ? 12 : 6">
                              <v-autocomplete v-model="line.singlesPurchaseEntryId" :items="singlesSaleCardOptions"
                                item-title="title" item-value="value" :label="t('saleEditorItemOptionalLabel')" variant="outlined"
                                density="compact" :disabled="!hasLotSelected" clearable hide-details="auto"
                                @update:model-value="onSinglesSaleLineCardSelectionChange(lineIndex, $event)">
                                <template #item="{ props, item }">
                                  <v-list-item v-bind="props" class="sale-editor-dropdown-item">
                                    <template v-if="item.raw.image" #prepend>
                                      <img :src="item.raw.image" :alt="item.raw.item" class="sale-editor-dropdown-thumb"
                                        loading="lazy" @error="$event.target.style.display='none'" />
                                    </template>
                                    <v-list-item-title class="text-body-2 font-weight-medium">
                                      {{ item.raw.item }}
                                      <span v-if="item.raw.cardNumber" class="text-medium-emphasis">#{{
                                        item.raw.cardNumber }}</span>
                                    </v-list-item-title>
                                    <v-list-item-subtitle class="text-caption">
                                      {{ t('saleEditorLineOptionSummary', { quantity: item.raw.quantity, cost: formatCurrency(item.raw.costBasis) }) }}
                                    </v-list-item-subtitle>
                                  </v-list-item>
                                </template>
                                <template #selection="{ item }">
                                  <div class="text-body-2 text-truncate">
                                    {{ item.raw.item }}
                                    <span v-if="item.raw.cardNumber" class="text-medium-emphasis">#{{
                                      item.raw.cardNumber }}</span>
                                  </div>
                                </template>
                              </v-autocomplete>
                            </v-col>
                            <v-col :cols="$vuetify?.display?.smAndDown ? 5 : 2">
                              <v-text-field v-model.number="line.quantity" :label="t('saleEditorQtyShortLabel')" type="number" variant="outlined"
                                density="compact" :disabled="!hasLotSelected" :min="1"
                                :max="line.singlesPurchaseEntryId ? (getSinglesSaleLineMaxQuantity(lineIndex) ?? null) : null"
                                hide-details="auto"
                                @update:model-value="onSinglesSaleLineQuantityChange(lineIndex, $event)"></v-text-field>
                            </v-col>
                            <v-col :cols="$vuetify?.display?.smAndDown ? 5 : 3">
                              <v-text-field v-model.number="line.price" :label="t('saleEditorLineTotalLabel')" type="number" variant="outlined"
                                density="compact" :disabled="!hasLotSelected" prefix="$" hide-details="auto"
                                @update:model-value="onSinglesSaleLinePriceChange"></v-text-field>
                            </v-col>
                            <v-col v-if="(newSale.singlesItems?.length || 0) > 1"
                              :cols="$vuetify?.display?.smAndDown ? 2 : 1" class="d-flex align-center justify-end">
                              <v-btn icon size="small" variant="text" color="error"
                                class="sale-editor-singles-line-delete" :title="t('saleEditorRemoveLineAction')" :aria-label="t('saleEditorRemoveLineAction')"
                                @click="removeSinglesSaleLine(lineIndex)">
                                <v-icon size="18">mdi-trash-can-outline</v-icon>
                              </v-btn>
                            </v-col>
                          </v-row>
                        </div>
                      </div>

                      <div class="sale-editor-singles-meta">
                        <div v-if="line.singlesPurchaseEntryId || Number(line.price || 0) <= 0"
                          class="sale-editor-singles-stock text-caption text-medium-emphasis">
                          {{ line.singlesPurchaseEntryId
                          ? t('saleEditorAvailableStockLabel', { count: getSinglesSaleLineMaxQuantity(lineIndex) ?? 0 })
                          : t('saleEditorUnlinkedLineHint') }}
                        </div>
                        <div v-if="
                          (line.singlesPurchaseEntryId || Number(line.price || 0) > 0)
                          && saleEditorLineProfitPreviews
                          && saleEditorLineProfitPreviews[lineIndex]
                        " class="sale-editor-singles-profit-pill text-caption"
                          :class="saleEditorLineProfitPreviews[lineIndex].colorClass">
                          {{ saleEditorLineProfitPreviews[lineIndex].sign }}${{
                          formatCurrency(Math.abs(saleEditorLineProfitPreviews[lineIndex].value)) }}
                          · {{ saleEditorLineProfitPreviews[lineIndex].sign }}{{
                          formatCurrency(Math.abs(saleEditorLineProfitPreviews[lineIndex].percent), 1) }}%
                          <span
                            v-if="(saleEditorLineProfitPreviews[lineIndex].quantity || 0) > 1 && saleEditorLineProfitPreviews[lineIndex].unitValue != null">
                          · /{{ t('salesSaleTypeItemLabel') }} {{ saleEditorLineProfitPreviews[lineIndex].sign }}${{
                            formatCurrency(Math.abs(saleEditorLineProfitPreviews[lineIndex].unitValue)) }}
                          </span>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div class="sale-editor-singles-footer">
                    <div v-if="saleEditorProfitPreview" class="sale-editor-singles-total text-caption"
                      :class="saleEditorProfitPreview.colorClass">
                      <div class="sale-editor-singles-total-main">
                        <span class="sale-editor-singles-total-pill">{{ t('saleEditorTotalLabel') }} ${{
                          formatCurrency(saleEditorProfitPreview.totalPrice) }}</span>
                        <span class="sale-editor-singles-total-pill">{{ t('saleEditorProfitLabel') }} {{ saleEditorProfitPreview.sign }}${{
                          formatCurrency(Math.abs(saleEditorProfitPreview.value)) }}</span>
                        <span class="sale-editor-singles-total-pill sale-editor-singles-total-pill--muted">{{
                          saleEditorProfitPreview.sign }}{{ formatCurrency(Math.abs(saleEditorProfitPreview.percent), 1)
                          }}% vs {{ saleEditorProfitPreview.basisLabel }} ${{
                          formatCurrency(saleEditorProfitPreview.basisValue) }}</span>
                        <span
                          v-if="saleEditorProfitPreview.marketBasisValue > 0 && saleEditorProfitPreview.costBasisValue > 0"
                          class="sale-editor-singles-total-pill sale-editor-singles-total-pill--muted">
                          {{ t('liveSinglesMarketLabel') }} ${{ formatCurrency(saleEditorProfitPreview.marketBasisValue) }} · {{ t('salesStatusCostLabel') }} ${{
                          formatCurrency(saleEditorProfitPreview.costBasisValue) }}
                        </span>
                      </div>
                      <div
                        v-if="(saleEditorProfitPreview.quantity || 0) > 1 && saleEditorProfitPreview.unitValue != null"
                        class="sale-editor-singles-total-sub">
                        {{ t('saleEditorPerItemLabel') }} {{ saleEditorProfitPreview.sign }}${{
                        formatCurrency(Math.abs(saleEditorProfitPreview.unitValue)) }}
                      </div>
                    </div>
                    <div class="sale-editor-singles-add-wrap">
                      <v-btn size="small" variant="tonal" color="secondary" prepend-icon="mdi-plus-circle-outline"
                        class="sale-editor-singles-add-btn" @click="addSinglesSaleLine">
                        {{ t('saleEditorAddItemAction') }}
                      </v-btn>
                    </div>
                  </div>
                </div>

                <div v-if="currentLotType !== 'singles'" class="sale-editor-section">
                  <div class="sale-editor-section-label">{{ t('saleEditorSectionDetailsLabel') }}</div>
                  <v-row dense>
                    <v-col cols="12" sm="6">
                      <v-select v-model="newSale.type" :items="[
                        { title: t('saleEditorTypeItemLabel'), value: 'pack' },
                        { title: t('saleEditorTypeBoxLabel'), value: 'box' },
                        { title: t('saleEditorTypeRandomHitLabel'), value: 'rtyh' }
                      ]" :label="t('saleEditorTypeLabel')" variant="outlined" :disabled="!hasLotSelected" hide-details="auto"
                        @update:model-value="onNewSaleTypeChange"></v-select>
                    </v-col>

                    <v-col cols="12" sm="6">
                      <v-text-field ref="saleQuantityInput" v-model.number="newSale.quantity" :label="t('saleEditorQuantityLabel')"
                        type="number" variant="outlined" :disabled="!hasLotSelected" :min="1"
                        hide-details="auto"></v-text-field>
                    </v-col>

                    <v-col cols="12" sm="6">
                      <v-text-field v-model.number="newSale.price" :label="t('saleEditorPricePerItemLabel')" type="number"
                        variant="outlined" :disabled="!hasLotSelected" prefix="$" hide-details="auto"></v-text-field>
                    </v-col>

                    <v-col v-if="newSale.type === 'rtyh'" cols="12" sm="6">
                      <v-text-field v-model.number="newSale.packsCount" :label="t('saleEditorItemsSoldRandomHitLabel')" type="number"
                        variant="outlined" :disabled="!hasLotSelected" :min="1"
                        :rules="[v => !!v || t('saleEditorRandomHitRequiredLabel')]" hide-details="auto"></v-text-field>
                    </v-col>
                  </v-row>
                </div>

                <div class="sale-editor-section">
                  <div class="sale-editor-section-label">{{ t('saleEditorSectionNotesLabel') }}</div>
                  <v-row dense>
                    <v-col cols="12" sm="6">
                      <v-text-field v-model="newSale.customer" :label="t('salesCustomerLabel')" variant="outlined"
                        :disabled="!hasLotSelected" hide-details="auto"></v-text-field>
                    </v-col>
                    <v-col cols="12" sm="6">
                      <v-text-field v-model.number="newSale.buyerShipping" :label="t('saleEditorBuyerShippingLabel')"
                        type="number" variant="outlined" :disabled="!hasLotSelected" prefix="$" :min="0"
                        hide-details="auto"></v-text-field>
                    </v-col>
                    <v-col cols="12" sm="6">
                      <v-text-field v-model="newSale.date" :label="t('saleEditorDateLabel')" type="date" variant="outlined"
                        :disabled="!hasLotSelected" hide-details="auto"></v-text-field>
                    </v-col>
                    <v-col cols="12">
                      <v-text-field v-model="newSale.memo" :label="t('saleEditorNotesLabel')" variant="outlined" :disabled="!hasLotSelected"
                        hide-details></v-text-field>
                    </v-col>
                  </v-row>
                </div>
              </div>
            </v-card-text>

            <v-card-actions class="sale-editor-actions">
              <v-spacer></v-spacer>
              <v-btn text @click="cancelSale">{{ t('commonCancel') }}</v-btn>
              <v-btn color="primary" @click="saveSale" :disabled="!canUsePaidActions">{{ editingSale ? t('saleEditorUpdateAction') : t('saleEditorAddAction')
                }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <portfolio-report-modal :ctx="this"></portfolio-report-modal>

        <v-dialog v-model="confirmDialog" max-width="420">
          <v-card>
            <v-card-title>{{ confirmTitle }}</v-card-title>
            <v-card-text>{{ confirmText }}</v-card-text>
            <v-card-actions>
              <v-spacer></v-spacer>
              <v-btn variant="text" @click="cancelConfirmAction">{{ t('commonCancel') }}</v-btn>
              <v-btn :color="confirmColor" @click="runConfirmAction">{{ t('commonConfirm') }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <whatnot-csv-import-dialog :ctx="this"></whatnot-csv-import-dialog>
        <whatnot-review-dialog :ctx="this"></whatnot-review-dialog>

        <v-snackbar v-model="showAppUpdatePrompt" color="secondary" location="top" :timeout="-1" role="status"
          aria-live="polite" aria-atomic="true" :close-on-content-click="false">
          {{ t('appUpdateReadyMessage') }}
          <template #actions>
            <v-btn variant="text" @click="dismissAppUpdate">{{ t('commonSkipForNow') }}</v-btn>
            <v-btn variant="flat" color="secondary" @click="applyAppUpdate">{{ t('shellRefreshAction') }}</v-btn>
          </template>
        </v-snackbar>

        <v-snackbar v-model="snackbar.show" :color="snackbar.color" location="bottom" timeout="2400" role="status"
          aria-live="polite" aria-atomic="true">
          {{ snackbar.text }}
        </v-snackbar>

      </template>

      <template v-else>
        <auth-gate-card :ctx="this"></auth-gate-card>
      </template>
    </v-app>
