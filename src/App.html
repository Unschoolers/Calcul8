<v-app>
      <template v-if="isGoogleSignedIn">
        <v-app-bar density="compact" flat border>
          <v-app-bar-title>
            <div class="app-bar-title-wrap">
              <span class="app-bar-brand-lockup" aria-hidden="true">
                <span class="app-bar-brand-badge">
                  <img src="../icons/icon-192.png" alt="" class="app-bar-brand-badge__img" />
                </span>
                <span class="app-bar-brand-copy">
                  <span class="app-bar-brand-copy__name">whatfees</span>
                  <span class="app-bar-brand-copy__tagline">{{ t('shellTagline') }}</span>
                </span>
              </span>
              <span class="app-bar-scope-chip"
                :class="scopeChipClass">
                <v-icon size="13" class="mr-1">
                  {{ scopeChipIcon }}
                </v-icon>
                {{ scopeChipLabel }}
              </span>
            </div>
          </v-app-bar-title>

          <template v-slot:append>
            <v-menu location="bottom end" offset="10" :transition="false" content-class="account-menu-content">
              <template #activator="{ props: accountMenuProps }">
                <v-btn v-bind="accountMenuProps" icon variant="text" size="default" class="account-menu-activator"
                  :title="googleProfileEmail ? t('accountMenuSignedInAsTitle', { email: googleProfileEmail }) : t('accountMenuSignedInFallback')"
                  :aria-label="t('accountMenuLabel')">
                  <v-avatar v-if="googleProfilePicture && !googleAvatarLoadFailed" size="28">
                    <img :src="googleProfilePicture" :alt="googleProfileName || 'Google profile picture'"
                      class="account-avatar-img" referrerpolicy="no-referrer" @error="googleAvatarLoadFailed = true"
                      @load="googleAvatarLoadFailed = false" />
                  </v-avatar>
                  <v-icon v-else size="26">mdi-account-circle-outline</v-icon>
                  <span
                    v-if="accountSyncBadgeVisible"
                    class="account-menu-sync-badge" :class="accountSyncBadgeClass" aria-hidden="true">
                    <v-icon :size="accountSyncIconSize" :class="accountSyncIconClass">
                      {{ accountSyncIcon }}
                    </v-icon>
                  </span>
                  <span v-if="hasProAccess" class="account-menu-pro-badge" aria-hidden="true">
                    <v-icon size="10">mdi-crown</v-icon>
                  </span>
                </v-btn>
              </template>

              <v-list class="account-menu-list">
                <div class="account-menu-header">
                  <v-avatar size="42" class="account-menu-header__avatar">
                    <img v-if="googleProfilePicture && !googleAvatarLoadFailed" :src="googleProfilePicture"
                      :alt="googleProfileName || 'Google profile picture'" class="account-avatar-img"
                      referrerpolicy="no-referrer" />
                    <span v-else class="account-menu-header__initial">
                      {{ (googleProfileName || googleProfileEmail || '?').slice(0, 1).toUpperCase() }}
                    </span>
                  </v-avatar>
                  <div class="account-menu-header__copy">
                    <div class="account-menu-header__name">
                      {{ googleProfileName || t('accountMenuGoogleAccountFallback') }}
                    </div>
                    <div class="account-menu-header__email">
                      {{ googleProfileEmail || t('accountMenuSignedInFallback') }}
                    </div>
                    <div class="account-menu-header__meta">
                      <div class="account-menu-header__workspace">
                        <span class="account-menu-header__workspace-name">{{ currentWorkspaceName }}</span>
                      </div>
                      <v-chip v-if="hasProAccess" size="x-small" color="warning" variant="flat"
                        class="account-menu-header__pro-chip">
                        <v-icon start size="12">mdi-crown</v-icon>
                        Pro
                      </v-chip>
                    </div>
                  </div>
                </div>

                <v-divider class="my-1"></v-divider>

                <v-list-subheader>{{ t('shellWorkspaceSectionLabel') }}</v-list-subheader>
                <v-list-item :title="t('personalLabel')" prepend-icon="mdi-home-account" :active="activeScopeType === 'personal'"
                  @click="switchToPersonalWorkspace"></v-list-item>
                <v-list-item v-for="workspace in availableWorkspaces" :key="workspace.workspaceId"
                  :subtitle="workspace.role === 'owner' ? t('shellWorkspaceRoleOwner') : t('shellWorkspaceRoleMember')"
                  prepend-icon="mdi-account-multiple-outline" :active="activeWorkspaceId === workspace.workspaceId"
                  @click="switchToWorkspace(workspace.workspaceId)">
                  <template #title>
                    <span class="workspace-menu-item-title">
                      <span class="workspace-menu-item-title__name">{{ workspace.name }}</span>
                      <span v-if="activeWorkspaceId === workspace.workspaceId && activeWorkspaceVisibleMembers.length"
                        class="workspace-avatar-stack" aria-hidden="true">
                        <span v-for="member in activeWorkspaceVisibleMembers"
                          :key="`${workspace.workspaceId}:${member.userId}`" class="workspace-avatar-stack__item">
                          <v-avatar size="24" class="workspace-avatar-stack__avatar">
                            <img v-if="member.photoUrl" :src="member.photoUrl"
                              :alt="member.displayName || 'Workspace member avatar'" class="account-avatar-img"
                              referrerpolicy="no-referrer" />
                            <span v-else class="workspace-avatar-stack__initial">
                              {{ (member.displayName || '?').slice(0, 1).toUpperCase() }}
                            </span>
                          </v-avatar>
                          <span class="workspace-avatar-stack__presence"
                            :class="`workspace-avatar-stack__presence--${getWorkspaceMemberPresenceState(member)}`"
                            :title="getWorkspaceMemberPresenceLabel(member)"></span>
                        </span>
                        <span v-if="activeWorkspaceOverflowMemberCount > 0" class="workspace-avatar-stack__overflow">
                          +{{ activeWorkspaceOverflowMemberCount }}
                        </span>
                      </span>
                    </span>
                  </template>
                </v-list-item>
                <v-list-item v-if="activeScopeType === 'personal'" :title="t('shellCreateSharedWorkspaceAction')"
                  prepend-icon="mdi-plus-circle-outline" @click="showCreateWorkspaceModal = true"></v-list-item>
                <v-list-item v-if="isWorkspaceScopeActive" :title="t('shellWorkspaceActionLabel')" prepend-icon="mdi-account-cog-outline"
                  @click="openWorkspaceMembersModal"></v-list-item>

                <v-divider class="my-1"></v-divider>

                <v-list-subheader>{{ t('shellAppSectionLabel') }}</v-list-subheader>
                <v-list-item v-if="showInstallPrompt" :title="t('shellInstallAppAction')" prepend-icon="mdi-download"
                  @click="promptInstall"></v-list-item>
                <v-list-item :title="t('shellImportWhatnotCsvAction')" :subtitle="t('shellImportWhatnotCsvSubtitle')"
                  prepend-icon="mdi-file-delimited-outline" @click="openWhatnotCsvImportDialog"></v-list-item>
                <v-list-item v-if="(whatnotConnectionSummary?.pendingReviewCount ?? 0) > 0 || whatnotReviewBatchId"
                  :title="whatnotConnectionSummary?.pendingReviewCount
                  ? `${t('shellReviewWhatnotImportsAction')} (${whatnotConnectionSummary.pendingReviewCount})`
                  : t('shellReviewWhatnotImportsAction')" :subtitle="t('shellReviewWhatnotImportsSubtitle')"
                  prepend-icon="mdi-table-eye" @click="openWhatnotReviewDialog"></v-list-item>
                <v-list-item v-if="isWorkspaceScopeActive" :title="workspaceRealtimeTitle"
                  :subtitle="workspaceRealtimeSubtitle" :prepend-icon="workspaceRealtimeIcon"></v-list-item>
                <v-list-item :title="syncStatusTitle"
                  :subtitle="syncStatusSubtitle" :prepend-icon="syncStatusIcon" @click="debugLogEntitlement(true)"></v-list-item>
                <v-list-item :title="isDark ? t('shellSwitchToLightModeAction') : t('shellSwitchToDarkModeAction')"
                  :prepend-icon="isDark ? 'mdi-weather-sunny' : 'mdi-weather-night'" @click="toggleTheme"></v-list-item>

                <v-divider class="my-1"></v-divider>

                <v-list-subheader>{{ t('shellLanguageSectionLabel') }}</v-list-subheader>
                <v-list-item :title="t('shellLanguageLabel')" class="account-menu-list__language-item">
                  <template #append>
                    <v-btn-toggle
                      :model-value="preferredLanguage || 'en'"
                      mandatory
                      density="compact"
                      variant="tonal"
                      @update:model-value="setPreferredLanguage($event)"
                    >
                      <v-btn value="en">{{ t('commonEnglishShort') }}</v-btn>
                      <v-btn value="fr-CA">{{ t('commonFrenchCanadaShort') }}</v-btn>
                    </v-btn-toggle>
                  </template>
                </v-list-item>

                <template v-if="whatnotConnectionStatus !== 'unconfigured'">
                  <v-divider class="my-1"></v-divider>

                  <v-list-subheader>{{ t('shellIntegrationsSectionLabel') }}</v-list-subheader>
                  <v-list-item :title="whatnotConnectionTitle"
                    :subtitle="whatnotConnectionSubtitle" :prepend-icon="whatnotConnectionIcon"></v-list-item>
                  <v-list-item
                    v-if="(activeScopeType === 'personal' || isCurrentWorkspaceOwner) && !whatnotConnectionSummary?.connected"
                    :title="whatnotConnectActionTitle"
                    prepend-icon="mdi-connection" :disabled="whatnotConnectionStatus === 'connecting'"
                    @click="connectWhatnot"></v-list-item>
                <v-list-item v-if="whatnotConnectionSummary?.connected" :title="whatnotConnectionSummary.pendingReviewCount > 0
                    ? `${t('shellReviewWhatnotImportsAction')} (${whatnotConnectionSummary.pendingReviewCount})`
                    : t('shellReviewWhatnotImportsAction')" prepend-icon="mdi-table-eye"
                    @click="openWhatnotReviewDialog"></v-list-item>
                  <v-list-item
                    v-if="whatnotConnectionSummary?.connected && (activeScopeType === 'personal' || isCurrentWorkspaceOwner)"
                    :title="whatnotSyncActionTitle"
                    prepend-icon="mdi-refresh" :disabled="whatnotSyncStatus === 'syncing'"
                    @click="syncWhatnotSales"></v-list-item>
                  <v-list-item
                    v-if="whatnotConnectionSummary?.connected && (activeScopeType === 'personal' || isCurrentWorkspaceOwner)"
                    :title="t('shellDisconnectWhatnotAction')" prepend-icon="mdi-link-off" @click="disconnectWhatnot"></v-list-item>

                  <v-divider class="my-1"></v-divider>
                </template>

                <v-list-subheader>{{ t('shellAccountSectionLabel') }}</v-list-subheader>
                <v-list-item :title="t('shellClearDataAction')" :subtitle="t('shellClearDataSubtitle')"
                  prepend-icon="mdi-delete-alert-outline" @click="askConfirmation(
                  {
                    title: t('shellClearDataConfirmTitle'),
                    text: t('shellClearDataConfirmBody'),
                    color: 'error'
                  },
                  () => clearPersonalAccountData()
                )"></v-list-item>
                <v-list-item :title="t('shellSignOutAction')" prepend-icon="mdi-logout" @click="logoutCurrentSession"></v-list-item>
              </v-list>
            </v-menu>
          </template>
        </v-app-bar>

        <v-main id="app-main" tabindex="-1">
          <v-container fluid class="pa-4 app-shell fill-height">
            <v-alert v-if="isOffline" type="warning" variant="tonal" density="compact" class="mb-3">
              {{ t('shellOfflineNotice') }}
            </v-alert>

            <!-- Lot Selector -->
            <v-card v-if="currentTab !== 'portfolio'" class="mb-4 preset-card" elevation="4">
              <v-card-text class="py-2">
                <v-row dense align="center" class="lot-selector-row">
                  <v-col cols="9" sm="9" md="10" class="lot-selector-select-col">
                    <v-select :model-value="currentLotId" :items="lotItems" item-title="title" item-value="value"
                      :label="t('shellLotLabel')" prepend-inner-icon="mdi-bookmark" variant="outlined" density="compact" hide-details
                      menu-icon="mdi-chevron-down" @update:model-value="selectLot">
                      <template #selection="{ item }">
                        <div v-if="item?.raw" class="lot-selector-selection">
                          <div class="lot-selector-selection__title-row">
                            <span class="lot-selector-icon-stack">
                              <v-icon size="16">{{ item.raw.symbolIcon }}</v-icon>
                              <v-icon v-if="item.raw.completionIcon" size="12" color="success"
                                class="lot-selector-icon-stack__badge">
                                {{ item.raw.completionIcon }}
                              </v-icon>
                            </span>
                            <div class="lot-selector-selection__title">{{ item.raw.title }}</div>
                          </div>
                          <div class="lot-selector-selection__subtitle">{{ item.raw.subtitle }}</div>
                        </div>
                      </template>

                      <template #item="{ props, item }">
                        <div>
                          <div v-if="item.raw.groupLabel" class="lot-selector-group-label">
                            <v-icon size="14" class="mr-1">
                              {{ item.raw.lotType === 'singles' ? 'mdi-cards-outline' : 'mdi-cube-outline' }}
                            </v-icon>
                            {{ item.raw.groupLabel }}
                          </div>
                          <v-list-item v-bind="props" :title="undefined" :subtitle="undefined">
                            <template #prepend>
                              <span class="lot-selector-icon-stack mr-2">
                                <v-icon size="18">
                                  {{ item.raw.symbolIcon }}
                                </v-icon>
                                <v-icon v-if="item.raw.completionIcon" size="12" color="success"
                                  class="lot-selector-icon-stack__badge">
                                  {{ item.raw.completionIcon }}
                                </v-icon>
                              </span>
                            </template>
                            <v-list-item-title class="text-body-2 font-weight-medium">
                              {{ item.raw.title }}
                            </v-list-item-title>
                            <v-list-item-subtitle class="text-caption">
                              {{ item.raw.subtitle }}
                            </v-list-item-subtitle>
                          </v-list-item>
                        </div>
                      </template>
                    </v-select>
                  </v-col>
                  <v-col cols="3" sm="3" md="2" class="lot-selector-meta-col">
                    <div class="lot-selector-meta">
                      <div class="lot-selector-actions">
                        <v-btn v-if="hasLotSelected" icon="mdi-pencil" size="small" variant="tonal" color="secondary"
                          class="lot-rename-btn" :title="t('shellEditLotAction')" :aria-label="t('shellEditLotAction')"
                          @click="openRenameLotModal"></v-btn>
                        <v-btn
                          id="guided-onboarding-add-lot-btn"
                          data-driver-target="guided-onboarding-add-lot-btn"
                          icon="mdi-bookmark-plus"
                          size="small"
                          variant="tonal"
                          color="primary"
                          class="lot-add-btn"
                          :title="t('shellAddLotAction')"
                          :aria-label="t('shellAddLotAction')"
                          @click="showNewLotModal = true"
                        ></v-btn>
                      </div>
                    </div>
                  </v-col>
                </v-row>
              </v-card-text>
            </v-card>

            <v-card
              v-if="guidedOnboardingStatus === 'available'"
              id="guided-onboarding-card"
              data-driver-target="guided-onboarding-card"
              class="mb-4 onboarding-intro-card"
              elevation="4"
            >
              <v-card-text class="onboarding-intro-card__content">
                <div class="onboarding-intro-card__eyebrow">{{ t('onboardingIntroEyebrow') }}</div>
                <div class="onboarding-intro-card__title">{{ t('onboardingIntroTitle') }}</div>
                <div class="onboarding-intro-card__body">{{ t('onboardingIntroBody') }}</div>
                <div class="onboarding-intro-card__actions">
                  <v-btn color="primary" variant="flat" @click="startGuidedOnboarding('bulk')">
                    {{ t('onboardingBulkCta') }}
                  </v-btn>
                  <v-btn color="secondary" variant="tonal" @click="startGuidedOnboarding('singles')">
                    {{ t('onboardingSinglesCta') }}
                  </v-btn>
                  <v-btn variant="text" @click="dismissGuidedOnboarding">
                    {{ t('onboardingSkipCta') }}
                  </v-btn>
                </div>
                <div class="onboarding-intro-card__summary">
                  <div>{{ t('onboardingBulkSummary') }}</div>
                  <div>{{ t('onboardingSinglesSummary') }}</div>
                </div>
              </v-card-text>
            </v-card>

            <v-alert v-else-if="guidedOnboardingStatus !== 'running' && !hasLotSelected" id="guided-onboarding-empty-state" type="warning" variant="tonal" density="compact"
              icon="mdi-information-outline" class="app-empty-state-alert mb-4">
              <span class="app-empty-state-alert__label">{{ t('shellNoLotTitle') }}</span>
              {{ t('shellNoLotBody') }}
            </v-alert>


            <!-- Tab Content -->
            <div :class="{ 'interaction-disabled': !hasLotSelected }"
              :style="!hasLotSelected ? 'pointer-events: none;' : null">
              <v-window v-model="currentTab"
                :class="['tabs-window', { 'tabs-window--allow-sticky': currentTab === 'wheel' || (currentLotType === 'singles' && (currentTab === 'live' || currentTab === 'config')) }]"
                transition="tab-slide-fast" reverse-transition="tab-slide-fast-reverse">
                <!-- CONFIG -->
                <v-window-item key="config" value="config" eager>
                  <singles-config-window v-if="hasLotSelected && currentLotType === 'singles'" ref="singlesConfigWindow"
                    :ctx="$root"></singles-config-window>
                  <config-window v-else :ctx="$root"></config-window>
                </v-window-item>

                <!-- LIVE -->
                <v-window-item key="live" value="live" eager>
                  <live-window ref="liveWindow" :ctx="$root"></live-window>
                </v-window-item>

                <!-- SALES -->
                <v-window-item key="sales" value="sales" eager>
                  <sales-window ref="salesWindow" :ctx="$root"></sales-window>
                </v-window-item>

                <!-- WHEEL -->
                <v-window-item key="wheel" value="wheel" eager>
                  <wheel-window ref="wheelWindow" :ctx="$root"></wheel-window>
                </v-window-item>

                <!-- PORTFOLIO -->
                <v-window-item key="portfolio" value="portfolio" eager>
                  <portfolio-window ref="portfolioWindow" :ctx="$root"></portfolio-window>
                </v-window-item>

              </v-window>
            </div>

            
          </v-container>

          <!-- Bottom Nav -->
          <v-bottom-navigation v-model="currentTab" color="primary" grow elevation="8" mandatory
            :aria-label="t('shellPrimaryNavigationAriaLabel')">
            <v-btn value="config" :ripple="false">
              <v-icon>mdi-cog</v-icon>
              <span>{{ t('shellNavConfigLabel') }}</span>
            </v-btn>
            <v-btn value="live" :disabled="isLiveTabDisabled" :ripple="false">
              <v-icon>mdi-target</v-icon>
              <span>{{ t('shellNavLiveLabel') }}</span>
            </v-btn>

            <v-btn value="sales" :disabled="!hasLotSelected" :ripple="false">
              <v-icon>mdi-chart-line</v-icon>
              <span>{{ t('shellNavSalesLabel') }}</span>
            </v-btn>

            <v-btn value="wheel" :disabled="!hasLotSelected" :ripple="false">
              <v-icon>mdi-tire</v-icon>
              <span>{{ t('shellNavWheelLabel') }}</span>
            </v-btn>

            <v-btn value="portfolio" :disabled="!hasLotSelected" :ripple="false">
              <v-icon>mdi-briefcase-outline</v-icon>
              <span>{{ t('shellNavPortfolioLabel') }}</span>
            </v-btn>



          </v-bottom-navigation>
        </v-main>

        <v-fab
          v-if="currentTab === 'config' && currentLotType === 'singles'"
          id="guided-onboarding-singles-add-fab"
          data-driver-target="guided-onboarding-singles-add-fab"
          icon="mdi-plus"
          color="primary"
          size="large"
          :title="t('shellAddSinglesPurchaseAction')"
          :aria-label="t('shellAddSinglesPurchaseAction')"
          :disabled="!hasLotSelected"
          @click="$refs.singlesConfigWindow?.handleAddSinglesPurchase?.()"
          class="fab-primary fab-add-preset"
        ></v-fab>

        <v-fab v-if="currentTab === 'live'" icon="mdi-calculator" color="secondary" size="large"
          :title="hasProAccess ? t('shellPriceCalculatorAction') : t('shellUpgradePriceCalculatorAction')"
          :aria-label="hasProAccess ? t('shellPriceCalculatorAction') : t('shellUpgradePriceCalculatorAction')"
          :disabled="!hasLotSelected" @click="accessProFeature('autoCalculate')"
          class="fab-primary fab-live-calc"></v-fab>

        <v-fab v-if="currentTab === 'live' && currentLotType === 'singles'" icon="mdi-broom" color="error" size="large"
          :title="t('shellClearLiveSinglesAction')" :aria-label="t('shellClearLiveSinglesAction')"
          :disabled="!hasLotSelected || effectiveLiveSinglesIds.length === 0" @click="askConfirmation(
          {
            title: t('shellClearLiveSinglesConfirmTitle'),
            text: t('shellClearLiveSinglesConfirmBody'),
            color: 'error'
          },
          () => clearLiveSinglesSelection()
        )" class="fab-primary fab-live-clear"></v-fab>

        <v-fab v-if="currentTab === 'live'" icon="mdi-restore" color="surface" size="large"
          :title="currentLotType === 'singles' ? t('shellResetLiveSinglesPricesAction') : t('shellResetLivePricesAction')"
          :aria-label="currentLotType === 'singles' ? t('shellResetLiveSinglesPricesAction') : t('shellResetLivePricesAction')"
          @click="resetLivePrices" class="fab-primary fab-live-reset"></v-fab>

        <v-fab v-if="currentTab === 'live' && currentLotType !== 'singles'" icon="mdi-content-save-outline"
          color="primary" size="large" :title="t('shellApplyLivePricesAction')" :aria-label="t('shellApplyLivePricesAction')"
          :disabled="!hasLotSelected" @click="applyLivePricesToDefaults" class="fab-primary fab-calculate"></v-fab>

        <v-fab
          v-if="currentTab === 'wheel'
            && $refs.wheelWindow?.wheelIsCompactLayout
            && !$refs.wheelWindow?.wheelPresentationMode
            && $refs.wheelWindow?.wheelMode === 'config'"
          icon="mdi-tune"
          color="secondary"
          size="large"
          :title="t('wheelInspectorBuilderTabLabel')"
          :aria-label="t('wheelInspectorBuilderTabLabel')"
          :disabled="!hasLotSelected"
          @click="$refs.wheelWindow?.openWheelInspector?.('config')"
          class="fab-primary fab-wheel-builder"
        ></v-fab>

        <v-fab
          v-if="currentTab === 'wheel'
            && $refs.wheelWindow?.wheelIsCompactLayout
            && !$refs.wheelWindow?.wheelPresentationMode
            && $refs.wheelWindow?.wheelMode === 'live'"
          icon="mdi-chart-box-outline"
          color="secondary"
          size="large"
          :title="t('wheelInspectorSessionTabLabel')"
          :aria-label="t('wheelInspectorSessionTabLabel')"
          :disabled="!hasLotSelected"
          @click="$refs.wheelWindow?.openWheelInspector?.('session')"
          class="fab-primary fab-wheel-session"
        ></v-fab>

        <v-fab
          v-if="currentTab === 'wheel' && $refs.wheelWindow?.wheelIsCompactLayout && !$refs.wheelWindow?.wheelPresentationMode"
          icon="mdi-history"
          color="surface"
          size="large"
          :title="t('wheelInspectorHistoryTabLabel')"
          :aria-label="t('wheelInspectorHistoryTabLabel')"
          :disabled="!hasLotSelected"
          @click="$refs.wheelWindow?.openWheelInspector?.('history')"
          class="fab-primary fab-wheel-history"
        ></v-fab>

        <v-fab
          v-if="currentTab === 'wheel'
            && $refs.wheelWindow?.wheelIsCompactLayout
            && !$refs.wheelWindow?.wheelPresentationMode
            && $refs.wheelWindow?.wheelMode === 'live'"
          icon="mdi-flag-checkered"
          color="warning"
          size="large"
          :title="t('wheelEndSessionAction')"
          :aria-label="t('wheelEndSessionAction')"
          :disabled="!hasLotSelected || $refs.wheelWindow?.wheelEndingSession"
          @click="$refs.wheelWindow?.startEndWheelSession?.()"
          class="fab-primary fab-wheel-end"
        ></v-fab>

        <!-- Primary FAB - Sales -->
        <div v-if="currentTab === 'sales' && hasProAccess" class="fab-overflow-wrap fab-overflow-sales">
          <v-speed-dial v-model="speedDialOpenSales" location="top center" transition="scale-transition"
            :open-on-hover="false" :close-on-content-click="false">
            <template v-slot:activator="{ props: activatorProps }">
              <v-fab v-bind="activatorProps" icon="mdi-cart-plus" color="primary" size="large" :title="t('saleEditorAddTitle')"
                :aria-label="t('saleEditorAddTitle')" :disabled="!hasLotSelected"></v-fab>
            </template>

            <v-btn v-if="currentLotType === 'singles'" :key="'card'" icon="mdi-cards-outline" color="primary"
              variant="elevated" size="small" class="sales-speed-action" :title="t('shellAddItemSaleAction')"
              :aria-label="t('shellAddItemSaleAction')" :disabled="!hasLotSelected"
              @click="openAddSaleModal('pack'); speedDialOpenSales = false"></v-btn>
            <template v-else>
              <v-btn :key="'item'" icon="mdi-tag-outline" color="primary" variant="elevated" size="small"
                class="sales-speed-action" :title="t('shellAddItemSaleAction')" :aria-label="t('shellAddItemSaleAction')"
                :disabled="!hasLotSelected" @click="openAddSaleModal('pack'); speedDialOpenSales = false"></v-btn>
              <v-btn :key="'box'" icon="mdi-cube-outline" color="secondary" variant="elevated" size="small"

                        <span class="sale-editor-singles-total-pill">{{ t('saleEditorTotalLabel') }} ${{
                          formatCurrency(saleEditorProfitPreview.totalPrice) }}</span>
                        <span class="sale-editor-singles-total-pill">{{ t('saleEditorProfitLabel') }} {{ saleEditorProfitPreview.sign }}${{
                          formatCurrency(Math.abs(saleEditorProfitPreview.value)) }}</span>
                        <span class="sale-editor-singles-total-pill sale-editor-singles-total-pill--muted">{{
                          saleEditorProfitPreview.sign }}{{ formatCurrency(Math.abs(saleEditorProfitPreview.percent), 1)
                          }}% vs {{ saleEditorProfitPreview.basisLabel }} ${{
                          formatCurrency(saleEditorProfitPreview.basisValue) }}</span>
                        <span
                          v-if="saleEditorProfitPreview.marketBasisValue > 0 && saleEditorProfitPreview.costBasisValue > 0"
                          class="sale-editor-singles-total-pill sale-editor-singles-total-pill--muted">
                          {{ t('liveSinglesMarketLabel') }} ${{ formatCurrency(saleEditorProfitPreview.marketBasisValue) }} · {{ t('salesStatusCostLabel') }} ${{
                          formatCurrency(saleEditorProfitPreview.costBasisValue) }}
                        </span>
                      </div>
                      <div
                        v-if="(saleEditorProfitPreview.quantity || 0) > 1 && saleEditorProfitPreview.unitValue != null"
                        class="sale-editor-singles-total-sub">
                        {{ t('saleEditorPerItemLabel') }} {{ saleEditorProfitPreview.sign }}${{
                        formatCurrency(Math.abs(saleEditorProfitPreview.unitValue)) }}
                      </div>
                    </div>
                    <div class="sale-editor-singles-add-wrap">
                      <v-btn size="small" variant="tonal" color="secondary" prepend-icon="mdi-plus-circle-outline"
                        class="sale-editor-singles-add-btn" @click="addSinglesSaleLine">
                        {{ t('saleEditorAddItemAction') }}
                      </v-btn>
                    </div>
                  </div>
                </div>

                <div v-if="currentLotType !== 'singles'" class="sale-editor-section">
                  <div class="sale-editor-section-label">{{ t('saleEditorSectionDetailsLabel') }}</div>
                  <v-row dense>
                    <v-col cols="12" sm="6">
                      <v-select v-model="newSale.type" :items="[
                        { title: t('saleEditorTypeItemLabel'), value: 'pack' },
                        { title: t('saleEditorTypeBoxLabel'), value: 'box' },
                        { title: t('saleEditorTypeRandomHitLabel'), value: 'rtyh' }
                      ]" :label="t('saleEditorTypeLabel')" variant="outlined" :disabled="!hasLotSelected" hide-details="auto"
                        @update:model-value="onNewSaleTypeChange"></v-select>
                    </v-col>

                    <v-col cols="12" sm="6">
                      <v-text-field ref="saleQuantityInput" v-model.number="newSale.quantity" :label="t('saleEditorQuantityLabel')"
                        type="number" variant="outlined" :disabled="!hasLotSelected" :min="1"
                        hide-details="auto"></v-text-field>
                    </v-col>

                    <v-col cols="12" sm="6">
                      <v-text-field v-model.number="newSale.price" :label="t('saleEditorPricePerItemLabel')" type="number"
                        variant="outlined" :disabled="!hasLotSelected" prefix="$" hide-details="auto"></v-text-field>
                    </v-col>

                    <v-col v-if="newSale.type === 'rtyh'" cols="12" sm="6">
                      <v-text-field v-model.number="newSale.packsCount" :label="t('saleEditorItemsSoldRandomHitLabel')" type="number"
                        variant="outlined" :disabled="!hasLotSelected" :min="1"
                        :rules="[v => !!v || t('saleEditorRandomHitRequiredLabel')]" hide-details="auto"></v-text-field>
                    </v-col>
                  </v-row>
                </div>

                <div class="sale-editor-section">
                  <div class="sale-editor-section-label">{{ t('saleEditorSectionNotesLabel') }}</div>
                  <v-row dense>
                    <v-col cols="12" sm="6">
                      <v-text-field v-model="newSale.customer" :label="t('salesCustomerLabel')" variant="outlined"
                        :disabled="!hasLotSelected" hide-details="auto"></v-text-field>
                    </v-col>
                    <v-col cols="12" sm="6">
                      <v-text-field v-model.number="newSale.buyerShipping" :label="t('saleEditorBuyerShippingLabel')"
                        type="number" variant="outlined" :disabled="!hasLotSelected" prefix="$" :min="0"
                        hide-details="auto"></v-text-field>
                    </v-col>
                    <v-col cols="12" sm="6">
                      <v-text-field v-model="newSale.date" :label="t('saleEditorDateLabel')" type="date" variant="outlined"
                        :disabled="!hasLotSelected" hide-details="auto"></v-text-field>
                    </v-col>
                    <v-col cols="12">
                      <v-text-field v-model="newSale.memo" :label="t('saleEditorNotesLabel')" variant="outlined" :disabled="!hasLotSelected"
                        hide-details></v-text-field>
                    </v-col>
                  </v-row>
                </div>
              </div>
            </v-card-text>

            <v-card-actions class="sale-editor-actions">
              <v-spacer></v-spacer>
              <v-btn text @click="cancelSale">{{ t('commonCancel') }}</v-btn>
              <v-btn color="primary" @click="saveSale" :disabled="!canUsePaidActions">{{ editingSale ? t('saleEditorUpdateAction') : t('saleEditorAddAction')
                }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <!-- Portfolio Report Modal -->
        <v-dialog v-model="showPortfolioReportModal" max-width="980" scrollable content-class="portfolio-report-dialog">
          <v-card class="portfolio-report-modal-card">
            <v-card-title class="d-flex align-center justify-space-between">
              <div>
                <v-icon class="mr-2">mdi-table</v-icon>
                {{ t('portfolioReportTitle') }}
              </div>
              <v-btn icon="mdi-close" variant="text" :title="t('portfolioReportCloseAction')" :aria-label="t('portfolioReportCloseAction')"
                @click="showPortfolioReportModal = false"></v-btn>
            </v-card-title>
            <v-divider></v-divider>

            <v-card-text class="portfolio-report-content">
              <div class="text-medium-emphasis mb-4">
                {{ t('portfolioReportGeneratedOnLabel') }} {{ formatDate(new Date().toISOString()) }}
              </div>

              <div v-if="$vuetify?.display?.lgAndUp" style="overflow-x: auto;">
                <table class="portfolio-report-table">
                  <thead>
                    <tr>
                      <th>{{ t('portfolioReportColumnLot') }}</th>
                      <th>{{ t('portfolioReportColumnType') }}</th>
                      <th>{{ t('portfolioReportColumnStatus') }}</th>
                      <th>{{ t('portfolioReportColumnSales') }}</th>
                      <th>{{ t('portfolioReportColumnSoldItems') }}</th>
                      <th>{{ t('portfolioReportColumnTotalItems') }}</th>
                      <th>{{ t('portfolioReportColumnSoldRevenue') }}</th>
                      <th>{{ t('portfolioReportColumnSoldCost') }}</th>
                      <th>{{ t('portfolioReportColumnRealizedProfit') }}</th>
                      <th>{{ t('portfolioReportColumnCurrentLotProfit') }}</th>
                      <th>{{ t('portfolioReportColumnSoldMargin') }}</th>
                      <th>{{ t('portfolioReportColumnForecastAverage') }}</th>
                      <th>{{ t('portfolioReportColumnLastSale') }}</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="row in allLotPerformance" :key="`report-${row.lotId}`">
                      <td>{{ row.lotName }}</td>
                      <td>{{ row.lotType }}</td>
                      <td>{{ row.salesCount > 0 ? t('portfolioReportStatusRealizedSales') : t('portfolioLotNoSalesLabel') }}</td>
                      <td>{{ row.salesCount }}</td>
                      <td>{{ row.soldPacks }}</td>
                      <td>{{ row.totalPacks }}</td>
                      <td>${{ formatCurrency(row.totalRevenue) }}</td>
                      <td>{{ row.salesCount > 0 ? `$${formatCurrency(row.realizedCost ?? 0)}` : '-' }}</td>
                      <td>{{ row.salesCount > 0 ? `${(row.realizedProfit ?? 0) >= 0 ? '+' :
                        ''}$${formatCurrency(row.realizedProfit ?? 0)}` : t('portfolioReportNoRealizedProfitYet') }}</td>
                      <td>{{ row.totalProfit >= 0 ? '+' : '' }}${{ formatCurrency(row.totalProfit) }}</td>
                      <td>{{ row.salesCount > 0 && row.realizedMarginPercent != null ?
                        `${formatCurrency(row.realizedMarginPercent, 2)}%` : '-' }}</td>
                      <td>{{ row.forecastProfitAverage == null ? '-' : `${row.forecastProfitAverage >= 0 ? '+' :
                        ''}$${formatCurrency(row.forecastProfitAverage)}` }}</td>
                      <td>{{ row.lastSaleDate ? formatDate(row.lastSaleDate) : '-' }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div v-else class="portfolio-report-card-grid">
                <article v-for="row in allLotPerformance" :key="`report-card-${row.lotId}`"
                  class="portfolio-report-card"
                  :class="{ 'is-expanded': portfolioReportExpandedLotIds.includes(row.lotId) }" role="button"
                  tabindex="0" :aria-expanded="portfolioReportExpandedLotIds.includes(row.lotId)"
                  :aria-controls="`portfolio-report-details-${row.lotId}`" :aria-label="`${row.lotName} ${t('portfolioReportDetailsLabel')}`"
                  @click="togglePortfolioReportLot(row.lotId)"
                  @keydown.enter.prevent="togglePortfolioReportLot(row.lotId)"
                  @keydown.space.prevent="togglePortfolioReportLot(row.lotId)">
                  <div class="portfolio-report-card-head">
                    <div class="portfolio-report-card-title-wrap">
                      <div class="portfolio-report-card-title">
                        <v-icon size="18" class="portfolio-report-card-type-icon">
                          {{ row.lotType === 'Singles' ? 'mdi-cards-outline' : 'mdi-cube-outline' }}
                        </v-icon>
                        <span>{{ row.lotName }}</span>
                      </div>
                    </div>
                    <v-btn icon variant="text" size="small" class="portfolio-report-card-toggle"
                      :title="portfolioReportExpandedLotIds.includes(row.lotId) ? t('portfolioReportHideDetailsAction') : t('portfolioReportShowDetailsAction')"
                      :aria-label="portfolioReportExpandedLotIds.includes(row.lotId) ? t('portfolioReportHideDetailsAction') : t('portfolioReportShowDetailsAction')"
                      :aria-expanded="portfolioReportExpandedLotIds.includes(row.lotId)"
                      :aria-controls="`portfolio-report-details-${row.lotId}`"
                      @click.stop="togglePortfolioReportLot(row.lotId)">
                      <v-icon>
                        {{ portfolioReportExpandedLotIds.includes(row.lotId) ? 'mdi-chevron-up' : 'mdi-chevron-down' }}
                      </v-icon>
                    </v-btn>
                  </div>

                  <div class="portfolio-report-card-summary">
                    <div class="portfolio-report-card-metric">
                      <span class="portfolio-report-card-label">{{ t('portfolioReportColumnRealizedProfit') }}</span>
                      <span class="portfolio-report-card-value" :class="row.salesCount > 0
                          ? ((row.realizedProfit ?? 0) >= 0 ? 'is-positive' : 'is-negative')
                          : 'is-neutral'">
                        {{ row.salesCount > 0
                        ? `${(row.realizedProfit ?? 0) >= 0 ? '+' : ''}$${formatCurrency(row.realizedProfit ?? 0)}`
                        : t('portfolioReportNoRealizedProfitShort') }}
                      </span>
                    </div>

                    <div class="portfolio-report-card-metric">
                      <span class="portfolio-report-card-label">{{ t('portfolioReportColumnCurrentLotProfit') }}</span>
                      <span class="portfolio-report-card-value"
                        :class="row.totalProfit >= 0 ? 'is-positive' : 'is-negative'">
                        {{ row.totalProfit >= 0 ? '+' : '' }}${{ formatCurrency(row.totalProfit) }}
                      </span>
                    </div>
                  </div>

                  <div v-if="portfolioReportExpandedLotIds.includes(row.lotId)"
                    :id="`portfolio-report-details-${row.lotId}`" class="portfolio-report-card-details">
                    <div class="portfolio-report-card-metrics">
                      <div class="portfolio-report-card-metric">
                        <span class="portfolio-report-card-label">{{ t('portfolioReportColumnStatus') }}</span>
                        <span class="portfolio-report-card-value is-neutral">
                          {{ row.salesCount > 0 ? t('portfolioReportStatusRealizedSales') : t('portfolioLotNoSalesLabel') }}
                        </span>
                      </div>

                      <div class="portfolio-report-card-metric">
                        <span class="portfolio-report-card-label">{{ t('portfolioReportColumnSales') }}</span>
                        <span class="portfolio-report-card-value">{{ row.salesCount }}</span>
                      </div>

                      <div class="portfolio-report-card-metric">
                        <span class="portfolio-report-card-label">{{ t('portfolioReportColumnSoldVsTotal') }}</span>
                        <span class="portfolio-report-card-value">{{ row.soldPacks }} / {{ row.totalPacks }}</span>
                      </div>

                      <div class="portfolio-report-card-metric">
                        <span class="portfolio-report-card-label">{{ t('portfolioReportColumnSoldRevenue') }}</span>
                        <span class="portfolio-report-card-value">${{ formatCurrency(row.totalRevenue) }}</span>
                      </div>

                      <div class="portfolio-report-card-metric">
                        <span class="portfolio-report-card-label">{{ t('portfolioReportColumnSoldCost') }}</span>
                        <span class="portfolio-report-card-value">
                          {{ row.salesCount > 0 ? `$${formatCurrency(row.realizedCost ?? 0)}` : '-' }}
                        </span>
                      </div>

                      <div class="portfolio-report-card-metric">
                        <span class="portfolio-report-card-label">{{ t('portfolioReportColumnSoldMargin') }}</span>
                        <span class="portfolio-report-card-value">
                          {{ row.salesCount > 0 && row.realizedMarginPercent != null
                          ? `${formatCurrency(row.realizedMarginPercent, 2)}%`
                          : '-' }}
                        </span>
                      </div>

                      <div v-if="row.forecastProfitAverage != null" class="portfolio-report-card-metric">
                        <span class="portfolio-report-card-label">{{ t('portfolioReportColumnForecastAverage') }}</span>
                        <span class="portfolio-report-card-value"
                          :class="row.forecastProfitAverage >= 0 ? 'is-positive' : 'is-negative'">
                          {{ `${row.forecastProfitAverage >= 0 ? '+' : ''}$${formatCurrency(row.forecastProfitAverage)}`
                          }}
                        </span>
                      </div>

                      <div class="portfolio-report-card-metric portfolio-report-card-metric--full">
                        <span class="portfolio-report-card-label">{{ t('portfolioReportColumnLastSale') }}</span>
                        <span class="portfolio-report-card-value">
                          {{ row.lastSaleDate ? formatDate(row.lastSaleDate) : '-' }}
                        </span>
                      </div>
                    </div>
                  </div>
                </article>
              </div>
            </v-card-text>

            <v-card-actions class="justify-space-between portfolio-report-actions">
              <v-btn variant="text" @click="showPortfolioReportModal = false">{{ t('portfolioReportCloseAction') }}</v-btn>
              <div class="d-flex align-center ga-2">
                <v-btn variant="text" prepend-icon="mdi-content-copy" :disabled="!hasPortfolioData"
                  @click="copyPortfolioReportTable">
                  {{ t('portfolioReportCopyAction') }}
                </v-btn>
                <v-btn color="error" prepend-icon="mdi-content-save-outline" :disabled="!hasPortfolioData"
                  @click="savePortfolioReportTable">
                  {{ t('portfolioReportSaveAction') }}
                </v-btn>
              </div>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <v-dialog v-model="confirmDialog" max-width="420">
          <v-card>
            <v-card-title>{{ confirmTitle }}</v-card-title>
            <v-card-text>{{ confirmText }}</v-card-text>
            <v-card-actions>
              <v-spacer></v-spacer>
              <v-btn variant="text" @click="cancelConfirmAction">{{ t('commonCancel') }}</v-btn>
              <v-btn :color="confirmColor" @click="runConfirmAction">{{ t('commonConfirm') }}</v-btn>
            </v-card-actions>
          </v-card>
        </v-dialog>

        <whatnot-csv-import-dialog :ctx="this"></whatnot-csv-import-dialog>
        <whatnot-review-dialog :ctx="this"></whatnot-review-dialog>

        <v-snackbar v-model="showAppUpdatePrompt" color="secondary" location="top" :timeout="-1" role="status"
          aria-live="polite" aria-atomic="true" :close-on-content-click="false">
          {{ t('appUpdateReadyMessage') }}
          <template #actions>
            <v-btn variant="text" @click="dismissAppUpdate">{{ t('commonSkipForNow') }}</v-btn>
            <v-btn variant="flat" color="secondary" @click="applyAppUpdate">{{ t('shellRefreshAction') }}</v-btn>
          </template>
        </v-snackbar>

        <v-snackbar v-model="snackbar.show" :color="snackbar.color" location="bottom" timeout="2400" role="status"
          aria-live="polite" aria-atomic="true">
          {{ snackbar.text }}
        </v-snackbar>

      </template>

      <template v-else>
        <v-main id="app-main" tabindex="-1">
          <v-container fluid class="auth-gate-shell">
            <v-card class="auth-gate-card" elevation="8" max-width="430">
              <v-card-text class="pa-6 pa-sm-8 text-center">
                <img src="../icons/icon-192.png" alt="WhatFees" class="auth-gate-logo" />
                <p class="text-overline auth-gate-overline mb-2">WhatFees</p>
                <h1 class="text-h5 font-weight-bold mb-2 auth-gate-title">
                  {{ authGateTitle }}
                </h1>
                <p class="text-body-2 text-medium-emphasis mb-6">
                  {{ authGateSubtitle }}
                </p>

                <v-btn block size="large" color="primary" class="auth-gate-btn" @click="promptGoogleSignIn">
                  <span class="auth-gate-btn__content">
                    <v-icon size="22" class="auth-gate-btn__icon">mdi-google</v-icon>
                    <span class="auth-gate-btn__label">{{ t('authContinueWithGoogleAction') }}</span>
                    <span class="auth-gate-btn__spacer" aria-hidden="true"></span>
                  </span>
                </v-btn>
              </v-card-text>
            </v-card>
          </v-container>
        </v-main>
      </template>
    </v-app>
