name: Deploy Pages

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate frontend env wiring
        shell: bash
        run: |
          if [ -z "${VITE_API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL is empty in github-pages environment."
            exit 1
          fi
          if [[ "${VITE_API_BASE_URL}" != https://*"/api" ]]; then
            echo "VITE_API_BASE_URL must start with https:// and end with /api."
            echo "Current value: ${VITE_API_BASE_URL}"
            exit 1
          fi
          if [ -z "${VITE_GOOGLE_CLIENT_ID}" ]; then
            echo "VITE_GOOGLE_CLIENT_ID is empty in github-pages environment."
            exit 1
          fi
          if [ -z "${VITE_PLAY_PRO_PRODUCT_ID}" ]; then
            echo "VITE_PLAY_PRO_PRODUCT_ID is empty in github-pages environment."
            exit 1
          fi
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_PLAY_PRO_PRODUCT_ID: ${{ vars.VITE_PLAY_PRO_PRODUCT_ID }}

      - name: Build production bundle
        shell: bash
        run: npm run build:prod
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_PLAY_PRO_PRODUCT_ID: ${{ vars.VITE_PLAY_PRO_PRODUCT_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
