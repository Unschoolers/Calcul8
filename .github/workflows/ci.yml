name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: npm run security:scan

      - name: Unit tests
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  validate-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: API unit tests
        working-directory: apps/api
        run: npm run test

      - name: API typecheck
        working-directory: apps/api
        run: npm run typecheck
