name: Deploy API (Dev)

on:
  push:
    branches: ["develop"]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api-dev.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev

    steps:
      - name: Validate deployment env wiring
        shell: bash
        env:
          AZURE_FUNCTIONAPP_NAME_DEV: ${{ vars.AZURE_FUNCTIONAPP_NAME_DEV }}
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE_DEV: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_DEV }}
        run: |
          if [ -z "${AZURE_FUNCTIONAPP_NAME_DEV}" ]; then
            echo "Missing vars.AZURE_FUNCTIONAPP_NAME_DEV in dev environment."
            exit 1
          fi
          if [ -z "${AZURE_FUNCTIONAPP_PUBLISH_PROFILE_DEV}" ]; then
            echo "Missing secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_DEV in dev environment."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Run API tests
        working-directory: apps/api
        run: npm run test

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Prune dev dependencies
        working-directory: apps/api
        run: npm prune --omit=dev

      - name: Deploy to Azure Functions (Dev)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME_DEV }}
          package: apps/api
          sku: flexconsumption
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_DEV }}
