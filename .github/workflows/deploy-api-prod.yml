name: Deploy API (Prod)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  verify:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Run API tests
        working-directory: apps/api
        run: npm run test

      - name: API typecheck
        working-directory: apps/api
        run: npm run typecheck

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    environment: prod-backend
    permissions:
      contents: read

    steps:
      - name: Validate deployment env wiring
        shell: bash
        env:
          AZURE_FUNCTIONAPP_NAME_PROD: ${{ vars.AZURE_FUNCTIONAPP_NAME_PROD }}
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD }}
        run: |
          if [ -z "${AZURE_FUNCTIONAPP_NAME_PROD}" ]; then
            echo "Missing vars.AZURE_FUNCTIONAPP_NAME_PROD in prod-backend environment."
            exit 1
          fi
          if [ -z "${AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD}" ]; then
            echo "Missing secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD in prod-backend environment."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Prune dev dependencies
        working-directory: apps/api
        run: npm prune --omit=dev

      - name: Deploy to Azure Functions (Prod)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME_PROD }}
          package: apps/api
          sku: flexconsumption
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD }}
