name: Deploy API (Prod)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "shared/**"
      - "package.json"
      - "package-lock.json"
      - "apps/api/package-lock.json"
      - ".github/workflows/deploy-api-prod.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: API verification
        working-directory: apps/api
        run: npm run verify

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    environment: prod-backend
    permissions:
      contents: read

    steps:
      - name: Validate deployment env wiring
        shell: bash
        env:
          AZURE_FUNCTIONAPP_NAME_PROD: ${{ vars.AZURE_FUNCTIONAPP_NAME_PROD }}
          MIGRATIONS_API_BASE_URL: ${{ vars.MIGRATIONS_API_BASE_URL }}
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD }}
        run: |
          if [ -z "${AZURE_FUNCTIONAPP_NAME_PROD}" ]; then
            echo "Missing vars.AZURE_FUNCTIONAPP_NAME_PROD in prod-backend environment."
            exit 1
          fi
          if [ -z "${MIGRATIONS_API_BASE_URL}" ]; then
            echo "Missing vars.MIGRATIONS_API_BASE_URL in prod-backend environment."
            echo "Expected format: https://<api-host>/api"
            exit 1
          fi
          if [[ "${MIGRATIONS_API_BASE_URL}" != https://*"/api" ]]; then
            echo "MIGRATIONS_API_BASE_URL must start with https:// and end with /api."
            echo "Current value: ${MIGRATIONS_API_BASE_URL}"
            exit 1
          fi
          if [ -z "${AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD}" ]; then
            echo "Missing secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD in prod-backend environment."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Prune dev dependencies
        working-directory: apps/api
        run: npm prune --omit=dev

      - name: Validate deployment package contents
        working-directory: apps/api
        shell: bash
        run: |
          set -euo pipefail

          test -f host.json || { echo "Missing host.json in deployment root."; exit 1; }
          test -f package.json || { echo "Missing package.json in deployment root."; exit 1; }
          test -f dist/index.js || { echo "Missing compiled entrypoint dist/index.js."; exit 1; }

          if ! compgen -G "dist/functions/*.js" > /dev/null; then
            echo "No compiled function files found under dist/functions/."
            exit 1
          fi

          node -e "const pkg = require('./package.json'); if (pkg.main !== 'dist/index.js') { console.error('Expected package.json main to be dist/index.js.'); process.exit(1); }"

          node <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const projectRoot = process.cwd();
          const distRoot = path.join(projectRoot, 'dist');
          const offenders = [];
          const requirePattern = /require\((['"])([^'"]+)\1\)/g;

          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const fullPath = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(fullPath);
                continue;
              }
              if (!entry.isFile() || !entry.name.endsWith('.js')) continue;

              const source = fs.readFileSync(fullPath, 'utf8');
              for (const match of source.matchAll(requirePattern)) {
                const specifier = match[2];
                if (!specifier.startsWith('.')) continue;
                const resolved = path.resolve(path.dirname(fullPath), specifier);
                if (!resolved.startsWith(projectRoot + path.sep)) {
                  offenders.push(`${path.relative(projectRoot, fullPath)} -> ${specifier}`);
                }
              }
            }
          }

          walk(distRoot);

          if (offenders.length > 0) {
            console.error('Compiled API references files outside apps/api deployment root:');
            for (const offender of offenders) {
              console.error(` - ${offender}`);
            }
            process.exit(1);
          }
          EOF

          staged_root="$(mktemp -d)"
          trap 'rm -rf "$staged_root"' EXIT

          cp host.json package.json "$staged_root"/
          cp -R dist "$staged_root"/
          cp -R node_modules "$staged_root"/

          pushd "$staged_root" > /dev/null
          node -e "require('./dist/index.js'); console.log('Staged deploy package loaded successfully.');"
          popd > /dev/null

      - name: Deploy to Azure Functions (Prod)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME_PROD }}
          package: apps/api
          sku: flexconsumption
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PROD }}

      - name: Smoke test deployed routes
        shell: bash
        env:
          SMOKE_API_BASE_URL: ${{ vars.MIGRATIONS_API_BASE_URL }}
        run: |
          set -euo pipefail

          paths=(
            "/auth/me"
            "/entitlements/me"
          )

          max_attempts=24
          sleep_seconds=5

          for attempt in $(seq 1 "$max_attempts"); do
            all_healthy=1

            for path in "${paths[@]}"; do
              url="${SMOKE_API_BASE_URL}${path}"
              status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "$url" || true)"

              if [ "$status" = "401" ]; then
                echo "Smoke check passed for $url ($status)."
                continue
              fi

              all_healthy=0
              echo "Smoke check pending for $url ($status) on attempt $attempt/$max_attempts."

              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "Final smoke check response for $url:"
                curl --silent --show-error --include "$url" || true
                echo
              fi
            done

            if [ "$all_healthy" -eq 1 ]; then
              exit 0
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Smoke test failed: expected unauthenticated GET routes to return 401 after deploy."
              exit 1
            fi

            sleep "$sleep_seconds"
          done
