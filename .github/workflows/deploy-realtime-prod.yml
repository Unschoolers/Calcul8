name: Deploy Realtime (Prod)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/realtime/**"
      - "shared/**"
      - "scripts/smoke-realtime.mjs"
      - "package.json"
      - "package-lock.json"
      - "apps/realtime/package-lock.json"
      - ".github/workflows/deploy-realtime-prod.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_CORE_OUTPUT: none
  NODE_VERSION: 22
  AZURE_RESOURCE_GROUP_PROD: DefaultResourceGroup-CCAN
  AZURE_CONTAINER_REGISTRY_NAME_PROD: calcul8teregistry
  AZURE_CONTAINER_REPOSITORY_NAME_REALTIME_PROD: whatfees-realtime
  AZURE_CONTAINER_REPOSITORY_KEEP_TAGS_PROD: 1
  REALTIME_ALLOWED_ORIGIN_PROD: https://app.whatfees.ca,https://whatfees.ca
  REALTIME_PUBLIC_BASE_URL_PROD: https://ws.whatfees.ca
  REALTIME_MIN_REPLICAS_PROD: 1
  REALTIME_MAX_REPLICAS_PROD: 1

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/realtime/package-lock.json

      - name: Install realtime dependencies
        working-directory: apps/realtime
        run: npm ci

      - name: Realtime verification
        working-directory: apps/realtime
        run: npm run verify

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    environment: prod-realtime
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Validate deployment env wiring
        shell: bash
        env:
          AZURE_CLIENT_ID_PROD: ${{ vars.AZURE_CLIENT_ID_PROD }}
          AZURE_TENANT_ID_PROD: ${{ vars.AZURE_TENANT_ID_PROD }}
          AZURE_SUBSCRIPTION_ID_PROD: ${{ vars.AZURE_SUBSCRIPTION_ID_PROD }}
          AZURE_CONTAINER_APP_NAME_REALTIME_PROD: ${{ vars.AZURE_CONTAINER_APP_NAME_REALTIME_PROD }}
          AZURE_CONTAINER_APP_ENVIRONMENT_PROD: ${{ vars.AZURE_CONTAINER_APP_ENVIRONMENT_PROD }}
          REALTIME_INTERNAL_API_KEY_PROD: ${{ secrets.REALTIME_INTERNAL_API_KEY_PROD }}
          REALTIME_TOKEN_SECRET_PROD: ${{ secrets.REALTIME_TOKEN_SECRET_PROD }}
        run: |
          if [ -z "${AZURE_CLIENT_ID_PROD}" ]; then
            echo "Missing vars.AZURE_CLIENT_ID_PROD in prod-realtime environment."
            exit 1
          fi
          if [ -z "${AZURE_TENANT_ID_PROD}" ]; then
            echo "Missing vars.AZURE_TENANT_ID_PROD in prod-realtime environment."
            exit 1
          fi
          if [ -z "${AZURE_SUBSCRIPTION_ID_PROD}" ]; then
            echo "Missing vars.AZURE_SUBSCRIPTION_ID_PROD in prod-realtime environment."
            exit 1
          fi
          if [ -z "${AZURE_CONTAINER_APP_NAME_REALTIME_PROD}" ]; then
            echo "Missing vars.AZURE_CONTAINER_APP_NAME_REALTIME_PROD in prod-realtime environment."
            exit 1
          fi
          if [ -z "${AZURE_CONTAINER_APP_ENVIRONMENT_PROD}" ]; then
            echo "Missing vars.AZURE_CONTAINER_APP_ENVIRONMENT_PROD in prod-realtime environment."
            exit 1
          fi
          if [ -z "${REALTIME_INTERNAL_API_KEY_PROD}" ]; then
            echo "Missing secrets.REALTIME_INTERNAL_API_KEY_PROD in prod-realtime environment."
            exit 1
          fi
          if [ -z "${REALTIME_TOKEN_SECRET_PROD}" ]; then
            echo "Missing secrets.REALTIME_TOKEN_SECRET_PROD in prod-realtime environment."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/realtime/package-lock.json

      - name: Install realtime smoke dependencies
        working-directory: apps/realtime
        run: npm ci --omit=dev

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID_PROD }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_PROD }}

      - name: Build, push, and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/apps/realtime
          dockerfilePath: Dockerfile
          acrName: ${{ env.AZURE_CONTAINER_REGISTRY_NAME_PROD }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME_REALTIME_PROD }}
          containerAppEnvironment: ${{ vars.AZURE_CONTAINER_APP_ENVIRONMENT_PROD }}
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP_PROD }}
          targetPort: 8080
          ingress: external
          disableTelemetry: true
          imageToBuild: ${{ env.AZURE_CONTAINER_REGISTRY_NAME_PROD }}.azurecr.io/whatfees-realtime:${{ github.sha }}

      - name: Configure Container App secrets and runtime settings
        shell: bash
        env:
          AZURE_CONTAINER_APP_NAME_REALTIME_PROD: ${{ vars.AZURE_CONTAINER_APP_NAME_REALTIME_PROD }}
          REALTIME_INTERNAL_API_KEY_PROD: ${{ secrets.REALTIME_INTERNAL_API_KEY_PROD }}
          REALTIME_TOKEN_SECRET_PROD: ${{ secrets.REALTIME_TOKEN_SECRET_PROD }}
        run: |
          set -euo pipefail

          az config set extension.use_dynamic_install=yes_without_prompt

          az containerapp secret set \
            --name "${AZURE_CONTAINER_APP_NAME_REALTIME_PROD}" \
            --resource-group "${AZURE_RESOURCE_GROUP_PROD}" \
            --secrets \
              realtime-internal-api-key=${REALTIME_INTERNAL_API_KEY_PROD} \
              realtime-token-secret=${REALTIME_TOKEN_SECRET_PROD}

          az containerapp update \
            --name "${AZURE_CONTAINER_APP_NAME_REALTIME_PROD}" \
            --resource-group "${AZURE_RESOURCE_GROUP_PROD}" \
            --min-replicas "${REALTIME_MIN_REPLICAS_PROD}" \
            --max-replicas "${REALTIME_MAX_REPLICAS_PROD}" \
            --set-env-vars \
              NODE_ENV=production \
              REALTIME_ALLOWED_ORIGIN="${REALTIME_ALLOWED_ORIGIN_PROD}" \
              REALTIME_DEV_ALLOW_UNAUTH_SUBSCRIBE=false \
              REALTIME_INTERNAL_API_KEY=secretref:realtime-internal-api-key \
              REALTIME_TOKEN_SECRET=secretref:realtime-token-secret

          mapfile -t active_revisions < <(
            az containerapp revision list \
              --name "${AZURE_CONTAINER_APP_NAME_REALTIME_PROD}" \
              --resource-group "${AZURE_RESOURCE_GROUP_PROD}" \
              --query "[?properties.active].name" \
              --output tsv
          )

          if [ "${#active_revisions[@]}" -eq 0 ]; then
            echo "No active realtime revisions found to restart after secret updates."
            exit 1
          fi

          for revision in "${active_revisions[@]}"; do
            if [ -z "${revision}" ]; then
              continue
            fi

            echo "Restarting realtime revision ${revision} so updated secrets take effect."
            az containerapp revision restart \
              --name "${AZURE_CONTAINER_APP_NAME_REALTIME_PROD}" \
              --resource-group "${AZURE_RESOURCE_GROUP_PROD}" \
              --revision "${revision}"
          done

      - name: Smoke check realtime publish and subscribe
        shell: bash
        env:
          AZURE_CONTAINER_APP_NAME_REALTIME_PROD: ${{ vars.AZURE_CONTAINER_APP_NAME_REALTIME_PROD }}
          REALTIME_INTERNAL_API_KEY: ${{ secrets.REALTIME_INTERNAL_API_KEY_PROD }}
          REALTIME_TOKEN_SECRET: ${{ secrets.REALTIME_TOKEN_SECRET_PROD }}
          REALTIME_SMOKE_ORIGIN: https://app.whatfees.ca
        run: |
          set -euo pipefail

          fqdn="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP_NAME_REALTIME_PROD}" \
            --resource-group "${AZURE_RESOURCE_GROUP_PROD}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)"

          if [ -z "${fqdn}" ]; then
            echo "Failed to resolve realtime container app FQDN."
            exit 1
          fi

          smoke_urls=("https://${fqdn}")
          if [ -n "${REALTIME_PUBLIC_BASE_URL_PROD:-}" ] && [ "${REALTIME_PUBLIC_BASE_URL_PROD}" != "https://${fqdn}" ]; then
            smoke_urls+=("${REALTIME_PUBLIC_BASE_URL_PROD}")
          fi

          for realtime_url in "${smoke_urls[@]}"; do
            echo "Checking realtime publish/subscribe smoke flow at ${realtime_url}"

            smoke_passed=0
            for attempt in 1 2 3 4 5; do
              if REALTIME_SMOKE_BASE_URL="${realtime_url}" npm run --silent smoke:realtime; then
                smoke_passed=1
                break
              fi

              echo "Realtime smoke attempt ${attempt} failed for ${realtime_url}; retrying in 5s..."
              sleep 5
            done

            if [ "${smoke_passed}" -ne 1 ]; then
              echo "Realtime publish/subscribe smoke check failed for ${realtime_url} after deployment."
              exit 1
            fi
          done

      - name: Prune old realtime images from ACR
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t tags < <(
            az acr repository show-tags \
              --name "${AZURE_CONTAINER_REGISTRY_NAME_PROD}" \
              --repository "${AZURE_CONTAINER_REPOSITORY_NAME_REALTIME_PROD}" \
              --orderby time_desc \
              --output tsv
          )

          keep_count="${AZURE_CONTAINER_REPOSITORY_KEEP_TAGS_PROD}"
          total_count="${#tags[@]}"

          echo "Found ${total_count} tags in ${AZURE_CONTAINER_REPOSITORY_NAME_REALTIME_PROD}; keeping newest ${keep_count}."

          if [ "${total_count}" -le "${keep_count}" ]; then
            echo "Nothing to prune."
            exit 0
          fi

          for tag in "${tags[@]:${keep_count}}"; do
            if [ -z "${tag}" ]; then
              continue
            fi

            echo "Deleting ${AZURE_CONTAINER_REPOSITORY_NAME_REALTIME_PROD}:${tag}"
            az acr repository delete \
              --name "${AZURE_CONTAINER_REGISTRY_NAME_PROD}" \
              --image "${AZURE_CONTAINER_REPOSITORY_NAME_REALTIME_PROD}:${tag}" \
              --yes
          done
