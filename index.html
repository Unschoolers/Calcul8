<!-- index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#E63946" />
  <meta name="apple-mobile-web-app-title" content="WhatFees" />
  <title>WhatFees</title>
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" rel="stylesheet" />
  <style>
    [v-cloak] {
      display: none !important;
    }

    body {
      margin: 0;
      background: #ffcb05;
    }

    #startup-splash {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffcb05;
    }

    .splash-card {
      position: relative;
      width: min(80vw, 320px);
      min-height: 206px;
      padding: 1.1rem 1.2rem 0.9rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 208, 0, 0.4);
      background: linear-gradient(170deg, rgba(255, 208, 0, 0.12), rgba(0, 0, 0, 0.58));
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      text-align: center;
      display: none;
    }

    body.splash-rich .splash-card {
      display: block;
    }

    .splash-logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      display: block;
      margin: 0 auto 0.55rem;
    }

    .splash-title {
      margin: 0;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: #ffd34d;
      font-size: 1.25rem;
      line-height: 1.25;
    }

    .splash-subtitle {
      margin: 0.18rem 0 0.65rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.2;
    }

    .splash-trend {
      width: 100%;
      height: 26px;
      display: block;
    }

    .splash-trend path {
      fill: none;
      stroke: #111;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .splash-status {
      margin: 0.85rem 0 0;
      font-size: 0.8rem;
      line-height: 1.35;
      color: rgba(255, 255, 255, 0.82);
      display: none;
    }

    .splash-status[data-visible="true"] {
      display: block;
    }

    .splash-actions {
      display: none;
      margin-top: 0.9rem;
      justify-content: center;
    }

    .splash-actions[data-visible="true"] {
      display: flex;
    }

    .splash-reload {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 0.6rem 1rem;
      font: inherit;
      font-weight: 700;
      color: #111;
      background: #ffd34d;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }
  </style>

</head>

<body>
  <a href="#app-main" class="skip-link">Skip to main content</a>
  <div id="startup-splash" aria-hidden="true">
    <div class="splash-card">
      <img src="icons/icon-192.png" alt="WhatFees" class="splash-logo" />
      <p class="splash-title">WhatFees</p>
      <p class="splash-subtitle">Track fees like a pro</p>
      <svg class="splash-trend" viewBox="0 0 200 30" preserveAspectRatio="none" role="presentation">
        <path pathLength="100" d="M4 22 L44 18 L78 21 L112 12 L148 14 L196 6"></path>
      </svg>
      <p class="splash-status" id="startup-splash-status" aria-live="polite"></p>
      <div class="splash-actions" id="startup-splash-actions">
        <button type="button" class="splash-reload" id="startup-splash-reload">Reload now</button>
      </div>
    </div>
  </div>
  <div id="app" v-cloak></div>
  <script src="https://js.stripe.com/v3/"></script>
  <script type="module" src="/src/main.ts"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>

</html>
