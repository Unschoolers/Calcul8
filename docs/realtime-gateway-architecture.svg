<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">WhatFees Realtime Gateway Architecture</title>
  <desc id="desc">Diagram showing the recommended migration from polling to a dedicated websocket gateway alongside the existing Azure Functions API.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accentPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#30240f"/>
      <stop offset="100%" stop-color="#221a0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffbf2f"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#76d39b"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; }
      .h1 { font-size: 34px; font-weight: 700; fill: #f6f1e8; }
      .h2 { font-size: 20px; font-weight: 700; fill: #ffbf2f; letter-spacing: 1px; }
      .h3 { font-size: 22px; font-weight: 700; fill: #f6f1e8; }
      .body { font-size: 18px; fill: #d7d2ca; }
      .muted { font-size: 16px; fill: #9f988f; }
      .label { font-size: 15px; font-weight: 700; fill: #0f0f0f; letter-spacing: 0.8px; }
      .pillText { font-size: 15px; font-weight: 700; fill: #1b1712; }
      .note { font-size: 17px; fill: #e8dfd0; }
      .small { font-size: 15px; fill: #d7d2ca; }
      .soft { stroke: #4b443d; stroke-width: 1.5; }
      .panel { fill: url(#panel); stroke: #3a342f; stroke-width: 1.5; rx: 28; }
      .accentPanel { fill: url(#accentPanel); stroke: #6b5521; stroke-width: 1.5; rx: 28; }
      .pillGold { fill: #ffbf2f; }
      .pillGreen { fill: #76d39b; }
      .pillRed { fill: #ff8266; }
      .lineGold { stroke: #ffbf2f; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .lineGreen { stroke: #76d39b; stroke-width: 4; fill: none; marker-end: url(#arrowSoft); }
      .lineDashed { stroke: #9f988f; stroke-width: 3; stroke-dasharray: 10 10; fill: none; }
    </style>
  </defs>

  <rect width="1400" height="920" fill="url(#bg)"/>

  <text x="60" y="70" class="h1">WhatFees Realtime Migration: Keep REST, Add a WebSocket Gateway</text>
  <text x="60" y="108" class="body">Recommended V1: existing HTTP API stays authoritative for writes, a small dedicated <tspan fill="#ffbf2f" font-weight="700">ws</tspan> server fans out changes to connected clients.</text>

  <rect x="60" y="150" width="360" height="290" class="panel" filter="url(#shadow)"/>
  <text x="90" y="192" class="h2">CLIENT</text>
  <text x="90" y="235" class="h3">Vue / PWA Frontend</text>
  <text x="90" y="274" class="body">1. Initial page load still uses REST</text>
  <text x="90" y="305" class="body">2. Open lot/workspace subscribes to a room</text>
  <text x="90" y="336" class="body">3. Incoming events patch local state</text>
  <text x="90" y="367" class="body">4. Polling stays as fallback / reconnect safety</text>
  <rect x="90" y="390" width="134" height="34" rx="17" class="pillGold"/>
  <text x="117" y="413" class="pillText">REST load</text>
  <rect x="236" y="390" width="154" height="34" rx="17" class="pillGreen"/>
  <text x="260" y="413" class="pillText">WS subscribe</text>

  <rect x="520" y="150" width="360" height="290" class="accentPanel" filter="url(#shadow)"/>
  <text x="550" y="192" class="h2">WRITE PATH</text>
  <text x="550" y="235" class="h3">Azure Functions API</text>
  <text x="550" y="274" class="body">Existing routes keep doing the real work:</text>
  <text x="550" y="305" class="body">• save sale</text>
  <text x="550" y="336" class="body">• delete sale</text>
  <text x="550" y="367" class="body">• update live pricing</text>
  <text x="550" y="398" class="body">After success, publish a small event outward.</text>
  <rect x="550" y="390" width="146" height="34" rx="17" class="pillGold"/>
  <text x="573" y="413" class="pillText">HTTP writes</text>
  <rect x="707" y="390" width="141" height="34" rx="17" class="pillGreen"/>
  <text x="730" y="413" class="pillText">Emit event</text>

  <rect x="980" y="150" width="360" height="290" class="panel" filter="url(#shadow)"/>
  <text x="1010" y="192" class="h2">REALTIME</text>
  <text x="1010" y="235" class="h3">Dedicated Node WebSocket Gateway</text>
  <text x="1010" y="274" class="body">Tiny long-lived process using <tspan fill="#ffbf2f" font-weight="700">ws</tspan></text>
  <text x="1010" y="305" class="body">• authenticate / validate subscribe requests</text>
  <text x="1010" y="336" class="body">• keep room maps by scope + lot</text>
  <text x="1010" y="367" class="body">• broadcast create/update/delete events</text>
  <text x="1010" y="398" class="body">No Cosmos writes here. Fan-out only.</text>
  <rect x="1010" y="390" width="166" height="34" rx="17" class="pillGreen"/>
  <text x="1040" y="413" class="pillText">Room broadcast</text>

  <rect x="520" y="540" width="360" height="190" class="panel" filter="url(#shadow)"/>
  <text x="550" y="582" class="h2">STORAGE</text>
  <text x="550" y="625" class="h3">Cosmos DB</text>
  <text x="550" y="664" class="body">Canonical sales + live pricing state</text>
  <text x="550" y="695" class="body">REST remains source of truth</text>

  <rect x="980" y="540" width="360" height="190" class="panel" filter="url(#shadow)"/>
  <text x="1010" y="582" class="h2">ROOM KEYS</text>
  <text x="1010" y="625" class="body">personal:&lt;userId&gt;:lot:&lt;lotId&gt;</text>
  <text x="1010" y="656" class="body">workspace:&lt;workspaceId&gt;:lot:&lt;lotId&gt;</text>
  <text x="1010" y="699" class="muted">Clients only receive events for the scope they joined.</text>

  <path d="M420 295 C470 295, 470 295, 520 295" class="lineGold"/>
  <path d="M880 295 C930 295, 930 295, 980 295" class="lineGreen"/>
  <path d="M1160 440 C1160 485, 1160 485, 1160 540" class="lineDashed"/>
  <path d="M700 440 C700 485, 700 485, 700 540" class="lineGold"/>
  <path d="M980 325 C900 325, 860 470, 770 470 C660 470, 520 470, 420 325" class="lineGreen"/>

  <rect x="60" y="500" width="360" height="320" class="panel" filter="url(#shadow)"/>
  <text x="90" y="542" class="h2">FLOW</text>
  <text x="90" y="585" class="body">1. Client opens a lot and loads REST state.</text>
  <text x="90" y="620" class="body">2. Client subscribes to that lot room.</text>
  <text x="90" y="655" class="body">3. User saves a sale / pricing change via HTTP.</text>
  <text x="90" y="690" class="body">4. API writes to Cosmos, then emits an event.</text>
  <text x="90" y="725" class="body">5. Gateway broadcasts to all connected viewers.</text>
  <text x="90" y="760" class="body">6. Clients patch local state immediately.</text>
  <text x="90" y="795" class="body">7. If socket drops, fallback polling or resync kicks in.</text>

  <rect x="60" y="850" width="1280" height="44" rx="22" fill="#231f1a" stroke="#4b443d" stroke-width="1.5"/>
  <circle cx="91" cy="872" r="10" class="pillRed"/>
  <text x="112" y="878" class="note">Do not replace your current API first. Add websocket fan-out beside it, keep REST authoritative, and turn polling down only after reconnect + fallback behavior is solid.</text>

  <rect x="980" y="470" width="220" height="40" rx="20" class="pillGold"/>
  <text x="1010" y="496" class="label">sale.upserted / sale.deleted</text>

  <rect x="1208" y="470" width="132" height="40" rx="20" class="pillGreen"/>
  <text x="1232" y="496" class="label">livePricing.updated</text>
</svg>
